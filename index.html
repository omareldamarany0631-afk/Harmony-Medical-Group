                            <div style={{fontSize:10,color:"#aaa",marginTop:2}}>{tat.tat}</div>
                          </div>
                        );
                      })()}
                    </td>
                    <td style={{padding:"10px 12px"}}>
                      <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap",border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.statuses[s.status]}</span>
                    </td>
                    <td style={{padding:"10px 12px",color:"#059669",whiteSpace:"nowrap"}}>{fmt(s.salePrice)} EGP</td>
                    <td style={{padding:"10px 12px"}}>
                      <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"3px 10px",fontSize:12,border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.payStatus[s.paymentStatus]}</span>
                    </td>
                    <td style={{padding:"10px 12px",whiteSpace:"nowrap"}}>
                      <button onClick={()=>onEdit(s.id)} style={{background:"transparent",color:"#555",border:"1px solid #e5e5e5",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,marginInlineEnd:6}}>{t.table.edit}</button>
                      <button onClick={()=>onDelete(s.id)} style={{background:"transparent",color:"#aaa",border:"1px solid #e5e5e5",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>{t.table.del}</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── Accounting ───────────────────────────────────────────────────────────────
function Accounting({ t, samples, setSamples }) {
  const mob = useIsMobile();
  const ar = t.dir === "rtl";
  const now = new Date();
  const [dateFrom, setDateFrom] = React.useState("");
  const [dateTo,   setDateTo]   = React.useState("");
  const [statusFilter, setStatusFilter] = React.useState("all");

  const filtered = samples.filter(s => {
    const d = s.collectDate || s.sentDate;
    if (dateFrom && d && d < dateFrom) return false;
    if (dateTo   && d && d > dateTo)   return false;
    if (statusFilter !== "all" && s.paymentStatus !== statusFilter) return false;
    return true;
  });

  const revenue   = filtered.reduce((a,s)=>a+Number(s.salePrice||0),0);
  const cost      = filtered.reduce((a,s)=>a+Number(s.labCost||0),0);
  const collected = filtered.reduce((a,s)=>a+Number(s.deposit||0),0);

  return (
    <div>
      <h2 style={{color:"#111",fontSize:mob?17:21,fontWeight:700,marginBottom:20,letterSpacing:"-0.4px"}}>{t.accounting.title}</h2>

      {/* ── Filters ── */}
      <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,padding:"14px 16px",marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr 1fr",gap:12,alignItems:"end"}}>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>📅 {ar?"من":"From"}</label>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{...inp(),padding:"9px 12px",fontSize:13}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>📅 {ar?"إلى":"To"}</label>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{...inp(),padding:"9px 12px",fontSize:13}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>{ar?"حالة الدفع":"Payment Status"}</label>
            <CustomSelect
              value={statusFilter}
              onChange={v=>setStatusFilter(v)}
              options={[{value:"all",label:ar?"الكل":"All"},...Object.entries(t.payStatus).map(([k,v])=>({value:k,label:v}))]}
            />
          </div>
        </div>
        {/* Summary badges */}
        <div style={{marginTop:12,display:"flex",gap:10,flexWrap:"wrap",fontSize:12,color:"#888"}}>
          <span>{filtered.length} {ar?"عينة":"samples"}</span>
          {(dateFrom||dateTo) && <span>·</span>}
          {dateFrom && <span>{ar?"من":"From"} {dateFrom}</span>}
          {dateTo && <span>{ar?"إلى":"To"} {dateTo}</span>}
          <button onClick={()=>{setDateFrom("");setDateTo("");setStatusFilter("all");}}
            style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:11,padding:0,textDecoration:"underline"}}>
            {ar?"مسح الفلتر":"Clear"}
          </button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(5,1fr)",gap:12,marginBottom:22}}>
        {[
          [t.accounting.revenue,fmt(revenue),"#6366f1"],
          [t.accounting.cost,fmt(cost),"#ef4444"],
          [t.accounting.profit,fmt(revenue-cost),"#10b981"],
          [t.accounting.collected,fmt(collected),"#f59e0b"],
          [t.accounting.remaining,fmt(revenue-collected),"#8b5cf6"],
        ].map(([l,v,c],i)=>(
          <div key={i} style={{background:"#fafafa",border:"1px solid #ebebeb",borderRadius:11,padding:"14px",borderTop:`3px solid ${c}`}}>
            <div style={{fontSize:mob?16:18,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"#111",marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>

      {mob ? (
        filtered.map((s,i)=>{
          const margin=Number(s.salePrice||0)-Number(s.labCost||0);
          const rem=Number(s.salePrice||0)-Number(s.deposit||0);
          return (
            <div key={s.id} style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,padding:14,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <div style={{color:"#111",fontWeight:600}}>{s.patientName}</div>
                <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"2px 8px",fontSize:12,border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.payStatus[s.paymentStatus]}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                <div style={{fontSize:12}}><div style={{color:"#111",marginBottom:2}}>Sale</div><div style={{color:"#059669",fontWeight:600}}>{fmt(s.salePrice)}</div></div>
                <div style={{fontSize:12}}><div style={{color:"#111",marginBottom:2}}>Cost</div><div style={{color:"#f87171"}}>{fmt(s.labCost)}</div></div>
                <div style={{fontSize:12}}><div style={{color:"#111",marginBottom:2}}>Margin</div><div style={{color:margin>=0?"#10b981":"#ef4444",fontWeight:600}}>{fmt(margin)}</div></div>
              </div>
              {s.paymentStatus!=="paid"&&(
                <button onClick={()=>setSamples(p=>p.map(x=>x.id===s.id?{...x,paymentStatus:"paid",deposit:x.salePrice}:x))}
                  style={{background:"#f5f5f7",color:"#15803d",border:"1px solid #e5e5e5",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:13,width:"100%"}}>
                  {t.accounting.markPaid}
                </button>
              )}
            </div>
          );
        })
      ) : (
        <div style={{background:"#fafafa",borderRadius:12,border:"1px solid #e2e8f0",overflow:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:600}}>
            <thead>
              <tr style={{background:"#fafafa"}}>
                {["Code","Patient","Sale","Cost","Margin","Deposit","Rem.","Status",""].map((h,i)=>(
                  <th key={i} style={{padding:"10px 12px",color:"#111",fontWeight:600,textAlign:"start",fontSize:12}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((s,i)=>{
                const margin=Number(s.salePrice||0)-Number(s.labCost||0);
                const rem=Number(s.salePrice||0)-Number(s.deposit||0);
                return (
                  <tr key={s.id} style={{borderTop:"1px solid #f0f0f0",background:i%2===0?"#ffffff":"#fafafa"}}>
                    <td style={{padding:"10px 12px",color:"#111",fontFamily:"monospace"}}>{s.sampleCode}</td>
                    <td style={{padding:"10px 12px",color:"#111",fontWeight:500}}>{s.patientName}</td>
                    <td style={{padding:"10px 12px",color:"#059669"}}>{fmt(s.salePrice)}</td>
                    <td style={{padding:"10px 12px",color:"#f87171"}}>{fmt(s.labCost)}</td>
                    <td style={{padding:"10px 12px",color:margin>=0?"#10b981":"#ef4444",fontWeight:600}}>{fmt(margin)}</td>
                    <td style={{padding:"10px 12px",color:"#f59e0b"}}>{fmt(s.deposit)}</td>
                    <td style={{padding:"10px 12px",color:rem>0?"#f59e0b":"#10b981",fontWeight:600}}>{fmt(rem)}</td>
                    <td style={{padding:"10px 12px"}}>
                      <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"3px 10px",fontSize:12,border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.payStatus[s.paymentStatus]}</span>
                    </td>
                    <td style={{padding:"10px 12px"}}>
                      {s.paymentStatus!=="paid"&&(
                        <button onClick={()=>setSamples(p=>p.map(x=>x.id===s.id?{...x,paymentStatus:"paid",deposit:x.salePrice}:x))}
                          style={{background:"#f5f5f7",color:"#15803d",border:"1px solid #e5e5e5",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✓</button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── Reports ──────────────────────────────────────────────────────────────────
function Reports({ t, samples }) {
  const mob = useIsMobile();
  const overdue = samples.filter(s=>s.status==="overdue"||(["sent","abroad"].includes(s.status)&&isOverdue(s)));
  return (
    <div>
      <h2 style={{color:"#111",fontSize:mob?17:21,fontWeight:700,marginBottom:20,letterSpacing:"-0.4px"}}>{t.reports.title}</h2>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:14,marginBottom:14}}>
        <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,padding:16}}>
          <div style={{fontWeight:600,color:"#111",marginBottom:14}}>📊 {t.reports.byStatus}</div>
          {Object.entries(t.statuses).map(([k,label])=>{
            const c=samples.filter(s=>s.status===k).length;
            const pct=samples.length?Math.round(c/samples.length*100):0;
            return (
              <div key={k} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#111",marginBottom:4}}>
                  <span>{label}</span><span style={{color:SC[k],fontWeight:600}}>{c}</span>
                </div>
                <div style={{background:"#ffffff",borderRadius:4,height:7}}>
                  <div style={{width:pct+"%",background:SC[k],borderRadius:4,height:7,transition:"width .5s"}}/>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,padding:16}}>
          <div style={{fontWeight:600,color:"#111",marginBottom:14}}>🏥 {t.reports.byLab}</div>
          {[...new Set(samples.map(s=>s.externalLab).filter(Boolean))].map((lab,i)=>{
            const c=samples.filter(s=>s.externalLab===lab).length;
            const rev=samples.filter(s=>s.externalLab===lab).reduce((a,s)=>a+Number(s.salePrice||0),0);
            const colors=["#6366f1","#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6"];
            return (
              <div key={lab} style={{display:"flex",alignItems:"center",gap:8,marginBottom:11,flexWrap:"wrap"}}>
                <div style={{width:10,height:10,borderRadius:3,background:"#aaa",flexShrink:0}}/>
                <div style={{flex:1,fontSize:12,color:"#111",minWidth:60}}>{lab.split("—")[0].trim()}</div>
                <div style={{fontSize:12,fontWeight:600,color:colors[i%colors.length]}}>{c}</div>
                <div style={{fontSize:11,color:"#111"}}>{fmt(rev)} EGP</div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{background:"#fafafa",border:`1px solid ${overdue.length?"#fca5a5":"#e2e8f0"}`,borderRadius:12,padding:16}}>
        <div style={{fontWeight:600,color:overdue.length?"#991b1b":"#000000",marginBottom:12}}>🚨 {t.reports.overdue}</div>
        {overdue.length===0 ? (
          <div style={{color:"#10b981",fontSize:14}}>{t.reports.noOverdue}</div>
        ) : overdue.map(s=>(
          <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #f0f0f0",gap:10}}>
            <div style={{minWidth:0,flex:1}}>
              <div style={{color:"#111",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.patientName}</div>
              <div style={{fontSize:11,color:"#888",marginTop:1}}>{s.sampleCode} · {s.testType}</div>
              <div style={{marginTop:6}}>
                {(()=>{
                  const d3=daysSince(s.sentDate);
                  const tat=getTAT(s.testType);
                  const pct=Math.min(100,Math.round((d3/tat.max)*100));
                  const extra=d3-tat.max;
                  return (
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                        <span style={{color:"#888"}}>TAT: {tat.tat}</span>
                        <span style={{color:"#dc2626",fontWeight:700}}>+{extra} {t.table.days} {t.dir==="rtl"?"متأخر":"overdue"}</span>
                      </div>
                      <div style={{background:"#ebebeb",borderRadius:4,height:6}}>
                        <div style={{width:pct+"%",background:"#dc2626",borderRadius:4,height:6}}/>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
            <div style={{textAlign:"end",flexShrink:0}}>
              <div style={{color:"#dc2626",fontWeight:700,fontSize:22}}>{daysSince(s.sentDate)}</div>
              <div style={{fontSize:10,color:"#aaa"}}>{t.table.days}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


// ─── ClientsPage ──────────────────────────────────────────────────────────────
function ClientsPage({ t, samples, isAdmin }) {
  const mob = useIsMobile();
  const [search, setSearch] = useState("");
  const [view, setView] = useState("labs");
  const [statusFilter, setStatusFilter] = useState("all"); // filter by sample status
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [period, setPeriod] = useState("custom"); // "custom" | "month" | "year" | "all"
  const ar = t.dir === "rtl";
  const now = new Date();

  // Quick period presets → set dateFrom/dateTo
  const applyPreset = (p) => {
    setPeriod(p);
    if (p === "all") { setDateFrom(""); setDateTo(""); return; }
    const to = now.toISOString().slice(0,10);
    if (p === "today") {
      setDateFrom(to); setDateTo(to);
    } else if (p === "month") {
      const from = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
      setDateFrom(from); setDateTo(to);
    } else if (p === "year") {
      setDateFrom(`${now.getFullYear()}-01-01`); setDateTo(to);
    }
  };

  // Core filter: use most relevant date per status
  const getRelevantDate = (s) => {
    if (s.status === "done")    return s.resultDate || s.sentDate;
    if (s.status === "overdue") return s.sentDate;
    return s.collectDate || s.sentDate;
  };
  const inRange = (s) => {
    const dateStr = getRelevantDate(s);
    if (!dateStr) return (!dateFrom && !dateTo); // no date = include only if no filter
    if (dateFrom && dateStr < dateFrom) return false;
    if (dateTo   && dateStr > dateTo)   return false;
    return true;
  };
  const matchStatus = (s) => statusFilter === "all" || s.status === statusFilter;
  const inScope = (s) => inRange(s) && matchStatus(s);

  // Date label per status
  const dateLabel = statusFilter === "done"
    ? (ar?"تاريخ النتيجة":"Result Date")
    : statusFilter === "overdue"
    ? (ar?"تاريخ الإرسال":"Sent Date")
    : (ar?"تاريخ التجميع/الإرسال":"Collect/Send Date");

  // ── Client Revenue Summary ──────────────────────────────────────────────────
  const labMap = {};
  samples.forEach(s => {
    const lab = s.hospital || (ar?"غير محدد":"Unassigned");
    if (!labMap[lab]) labMap[lab] = { samples:[], periodSamples:[] };
    labMap[lab].samples.push(s);
    if (inScope(s)) labMap[lab].periodSamples.push(s);
  });

  const labColors = ["#6366f1","#10b981","#f59e0b","#ef4444","#3b82f6","#8b5cf6","#ec4899"];
  const labs = Object.entries(labMap).sort((a,b)=>b[1].periodSamples.length - a[1].periodSamples.length);

  const totalPeriodRevenue = labs.reduce((sum,[,v])=>sum+v.periodSamples.reduce((a,s)=>a+Number(s.salePrice||0),0),0);
  const totalPeriodCost    = labs.reduce((sum,[,v])=>sum+v.periodSamples.reduce((a,s)=>a+Number(s.labCost||0),0),0);
  const totalPeriodSamples = labs.reduce((sum,[,v])=>sum+v.periodSamples.length,0);

  // ── Patient Map ──────────────────────────────────────────────────────────────
  const clientMap = {};
  samples.forEach(s => {
    if (!clientMap[s.patientName]) clientMap[s.patientName] = [];
    clientMap[s.patientName].push(s);
  });
  const clients = Object.entries(clientMap)
    .filter(([name]) => !search || name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => b[1].length - a[1].length);

  const presets = [
    ["today",  ar?"اليوم":"Today"],
    ["month",  ar?"هذا الشهر":"This Month"],
    ["year",   ar?"هذه السنة":"This Year"],
    ["all",    ar?"الكل":"All Time"],
  ];

  const rangeLabel = dateFrom||dateTo
    ? `${dateFrom||"∞"} → ${dateTo||"∞"}`
    : (ar?"كل التواريخ":"All dates");

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{color:"#111",fontSize:mob?17:20,margin:0}}>{t.nav.clients}</h2>
        {/* View toggle */}
        <div style={{display:"flex",background:"#fafafa",borderRadius:8,padding:3,gap:2}}>
          {[["labs",ar?"العملاء":"Clients"],["patients",ar?"المرضى":"Patients"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)}
              style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:view===v?"#111":"transparent",color:view===v?"#fff":"#888",boxShadow:view===v?"0 1px 4px rgba(0,0,0,0.1)":"none",transition:"all .15s"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* ── Filters bar ── */}
      <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,padding:"14px 16px",marginBottom:18}}>
        {/* Quick presets */}
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:12,fontWeight:600,color:"#555",marginInlineEnd:4}}>{ar?"فترة سريعة:":"Quick:"}</span>
          {presets.map(([v,l])=>(
            <button key={v} onClick={()=>applyPreset(v)}
              style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:period===v?"#6366f1":"#f1f5f9",color:period===v?"#ffffff":"#6b7280",transition:"all .15s"}}>
              {l}
            </button>
          ))}
        </div>

        {/* Custom date range */}
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr 1fr",gap:10,alignItems:"end"}}>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>
              📅 {ar?"من":"From"} <span style={{color:"#6366f1",fontWeight:400,fontSize:11}}>({dateLabel})</span>
            </label>
            <input type="date" value={dateFrom} onChange={e=>{setDateFrom(e.target.value);setPeriod("custom");}}
              style={{...inp(),padding:"8px 12px",fontSize:13}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>
              📅 {ar?"إلى":"To"} <span style={{color:"#6366f1",fontWeight:400,fontSize:11}}>({dateLabel})</span>
            </label>
            <input type="date" value={dateTo} onChange={e=>{setDateTo(e.target.value);setPeriod("custom");}}
              style={{...inp(),padding:"8px 12px",fontSize:13}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>
              🔵 {ar?"حالة العينة":"Sample Status"}
            </label>
            <CustomSelect
              value={statusFilter}
              onChange={v=>setStatusFilter(v)}
              options={[{value:"all",label:ar?"كل الحالات":"All Statuses"},...Object.entries(t.statuses).map(([k,v])=>({value:k,label:v}))]}
            />
          </div>
        </div>

        {/* Active filter summary */}
        {(dateFrom||dateTo||statusFilter!=="all") && (
          <div style={{marginTop:10,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
            <div style={{fontSize:12,color:"#111",fontWeight:500}}>
              🔍 {rangeLabel}{statusFilter!=="all"?` · ${t.statuses[statusFilter]}`:""}
              {" — "}{totalPeriodSamples} {ar?"عينة":"samples"}
            </div>
            <button onClick={()=>{setDateFrom("");setDateTo("");setStatusFilter("all");setPeriod("all");}}
              style={{background:"#fafafa",color:"#888",border:"none",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:12}}>
              ✕ {ar?"مسح الفلتر":"Clear"}
            </button>
          </div>
        )}
      </div>

      {/* ── LABS VIEW ─────────────────────────────────────────────────────────── */}
      {view==="labs" && (
        <div>
          {/* Summary cards */}
          {isAdmin && (
            <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(3,1fr)",gap:12,marginBottom:20}}>
              {[
                {l:ar?"إجمالي الإيرادات":"Total Revenue", v:fmt(totalPeriodRevenue)+" EGP", c:"#6366f1"},
                {l:ar?"إجمالي التكاليف":"Total Cost",    v:fmt(totalPeriodCost)+" EGP",    c:"#ef4444"},
                {l:ar?"صافي الربح":"Net Profit",         v:fmt(totalPeriodRevenue-totalPeriodCost)+" EGP", c:"#10b981"},
              ].map((card,i)=>(
                <div key={i} style={{background:"#ffffff",border:`1px solid ${card.c}33`,borderRadius:12,padding:16,borderTop:`3px solid ${card.c}`}}>
                  <div style={{fontSize:mob?18:22,fontWeight:700,color:card.c}}>{card.v}</div>
                  <div style={{fontSize:12,color:"#888",marginTop:3}}>{card.l} — {rangeLabel}</div>
                </div>
              ))}
            </div>
          )}

          {/* Per-client breakdown */}
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
            {labs.map(([labName, data], idx)=>{
              const ps = data.periodSamples;
              const allS = data.samples;
              const revenue = ps.reduce((a,s)=>a+Number(s.salePrice||0),0);
              const cost    = ps.reduce((a,s)=>a+Number(s.labCost||0),0);
              const profit  = revenue - cost;
              const pct = totalPeriodSamples ? Math.round(ps.length/totalPeriodSamples*100) : 0;
              const clr = labColors[idx % labColors.length];
              const done = ps.filter(s=>s.status==="done").length;
              const overdue = ps.filter(s=>s.status==="overdue").length;
              const [expanded, setExpanded] = React.useState(false);
              return (
                <div key={labName} style={{background:"#ffffff",border:`1px solid ${expanded?clr+"66":"#e2e8f0"}`,borderRadius:12,overflow:"hidden",transition:"border-color .2s"}}>
                  {/* Lab header */}
                  <div style={{background:`${clr}11`,borderBottom:`1px solid ${clr}33`,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:15,color:"#111"}}>{labName}</div>
                      <div style={{fontSize:11,color:"#888",marginTop:1}}>{ar?"إجمالي العينات":"Total samples"}: {allS.length}</div>
                    </div>
                    <span style={{background:clr,color:"#fff",borderRadius:8,padding:"4px 12px",fontSize:13,fontWeight:700}}>{ps.length}</span>
                  </div>

                  <div style={{padding:16}}>
                    {/* Progress bar — clickable for details */}
                    <div style={{marginBottom:12,cursor:"pointer"}} onClick={()=>setExpanded(e=>!e)}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                        <span style={{color:clr,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                          {ar?"نسبة الشحنات":"Share of shipments"}
                          <span style={{background:clr+"22",borderRadius:4,padding:"1px 6px",fontSize:10}}>{expanded?(ar?"إخفاء":"Hide"):(ar?"تفاصيل":"Details")} {expanded?"▲":"▼"}</span>
                        </span>
                        <span style={{fontWeight:700,color:clr,fontSize:13}}>{pct}%</span>
                      </div>
                      <div style={{background:"#fafafa",borderRadius:4,height:8}}>
                        <div style={{width:pct+"%",background:clr,borderRadius:4,height:8,transition:"width .5s"}}/>
                      </div>
                    </div>

                    {/* Status pills */}
                    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                      <span style={{background:"#f5f5f7",color:"#15803d",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}}>✓ {done} {ar?"خلصت":"done"}</span>
                      {overdue>0 && <span style={{background:"#fafafa",color:"#be123c",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}}>⚠ {overdue} {ar?"متأخرة":"overdue"}</span>}
                      <span style={{background:"#fafafa",color:"#888",borderRadius:6,padding:"2px 8px",fontSize:11}}>{ps.length-done-overdue} {ar?"جارية":"in progress"}</span>
                    </div>

                    {/* ── EXPANDED DETAILS ── */}
                    {expanded && (
                      <div style={{borderTop:"1px solid #f0f0f0",paddingTop:12,marginBottom:12}}>
                        {/* Per-sample list */}
                        <div style={{maxHeight:280,overflowY:"auto"}}>
                          {ps.map((s,i)=>(
                            <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:i%2===0?"#f8fafc":"#ffffff",borderRadius:8,marginBottom:4,gap:8}}>
                              <div style={{minWidth:0,flex:1}}>
                                <div style={{fontWeight:600,fontSize:12,color:"#111",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.patientName}</div>
                                <div style={{fontSize:10,color:"#aaa",marginTop:1,display:"flex",gap:6,flexWrap:"wrap"}}>
                                  <span style={{fontFamily:"monospace"}}>{s.sampleCode}</span>
                                  <span>·</span>
                                  <span>{s.testType}</span>
                                </div>
                                {(s.collectDate||s.sentDate) && (
                                  <div style={{fontSize:10,color:"#aaa",marginTop:1}}>
                                    📅 {s.collectDate||s.sentDate}
                                    {s.shipmentNumber && <span style={{marginInlineStart:6,color:clr,fontFamily:"monospace"}}>🚚 {s.shipmentNumber}</span>}
                                  </div>
                                )}
                              </div>
                              <div style={{flexShrink:0,textAlign:"end"}}>
                                <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,display:"block",whiteSpace:"nowrap",border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.statuses[s.status]}</span>
                                {isAdmin && s.salePrice && <div style={{fontSize:10,color:"#6366f1",marginTop:2,fontWeight:600}}>{fmt(s.salePrice)} EGP</div>}
                              </div>
                            </div>
                          ))}
                        </div>

                        {/* Shipments summary */}
                        {(() => {
                          const shipNums = [...new Set(ps.map(s=>s.shipmentNumber).filter(Boolean))];
                          return shipNums.length > 0 ? (
                            <div style={{marginTop:10,padding:"8px 10px",background:"#f5f5f7",borderRadius:8}}>
                              <div style={{fontSize:11,fontWeight:600,color:"#111",marginBottom:4}}>🚚 {ar?"الشحنات":"Shipments"} ({shipNums.length})</div>
                              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                                {shipNums.map(sn=>(
                                  <span key={sn} style={{background:"#ffffff",border:"1px solid #e5e5e5",borderRadius:6,padding:"2px 8px",fontSize:11,color:"#111",fontFamily:"monospace"}}>{sn}</span>
                                ))}
                              </div>
                            </div>
                          ) : null;
                        })()}
                      </div>
                    )}

                    {/* Financials - admin only */}
                    {isAdmin && (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,borderTop:"1px solid #f0f0f0",paddingTop:12}}>
                        {[
                          [ar?"إيرادات":"Revenue", fmt(revenue), "#6366f1"],
                          [ar?"تكلفة":"Cost",      fmt(cost),    "#ef4444"],
                          [ar?"ربح":"Profit",      fmt(profit),  profit>=0?"#10b981":"#ef4444"],
                        ].map(([l,v,c],i)=>(
                          <div key={i} style={{textAlign:"center"}}>
                            <div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div>
                            <div style={{fontSize:10,color:"#aaa",marginTop:1}}>{l}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── PATIENTS VIEW ─────────────────────────────────────────────────────── */}
      {view==="patients" && (
        <div>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 ..."
            style={{width:"100%",boxSizing:"border-box",...inp(),padding:"10px 14px",marginBottom:14}}/>
          <div style={{marginBottom:10,fontSize:13,color:"#888"}}>{clients.length} {ar?"عميل":"clients"}</div>
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
            {clients.map(([name, samps])=>{
              const paid = samps.filter(s=>s.paymentStatus==="paid").length;
              const totalRev = samps.reduce((a,s)=>a+Number(s.salePrice||0),0);
              return (
                <div key={name} style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,padding:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={{minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#111",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                      <div style={{fontSize:11,color:"#888",marginTop:2}}>{samps[samps.length-1]?.externalLab?.split("—")[0]?.trim()}</div>
                    </div>
                    <span style={{background:"#f5f5f7",color:"#111",borderRadius:6,padding:"3px 10px",fontSize:13,fontWeight:700,flexShrink:0}}>{samps.length}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                    <div style={{background:"#fafafa",borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#10b981"}}>{samps.filter(s=>s.status==="done").length}</div>
                      <div style={{fontSize:10,color:"#888"}}>{ar?"خلصت":"Done"}</div>
                    </div>
                    <div style={{background:"#fafafa",borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:15,fontWeight:700,color:paid===samps.length?"#10b981":"#f59e0b"}}>{paid}/{samps.length}</div>
                      <div style={{fontSize:10,color:"#888"}}>{ar?"مدفوع":"Paid"}</div>
                    </div>
                    {isAdmin && (
                      <div style={{background:"#fafafa",borderRadius:8,padding:"8px",textAlign:"center"}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#6366f1"}}>{fmt(totalRev)}</div>
                        <div style={{fontSize:10,color:"#888"}}>EGP</div>
                      </div>
                    )}
                  </div>
                  <div style={{marginTop:10,borderTop:"1px solid #f0f0f0",paddingTop:8}}>
                    {samps.slice(-2).map(s=>(
                      <div key={s.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3,gap:6}}>
                        <span style={{color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.testType}</span>
                        <span style={{background:"#fff",color:"#111",borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:600,flexShrink:0,border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.statuses[s.status]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ResultsPage ──────────────────────────────────────────────────────────────
function ResultsPage({ t, samples, setSamples }) {
  const mob = useIsMobile();
  const ar = t.dir === "rtl";
  const [search, setSearch] = useState("");
  const [markingId, setMarkingId] = useState(null);  // which sample is showing the mark-done form
  const [resultNote, setResultNote] = useState("");
  const [pdfData, setPdfData] = useState(null);      // base64 pdf
  const [pdfName, setPdfName] = useState("");
  const [viewingId, setViewingId] = useState(null);  // which done sample is expanded

  const pending = samples.filter(s => s.status !== "done");
  const done    = samples.filter(s => s.status === "done");

  const filtered = (arr) => !search ? arr : arr.filter(s =>
    s.patientName?.toLowerCase().includes(search.toLowerCase()) ||
    s.sampleCode?.toLowerCase().includes(search.toLowerCase())
  );

  const handleMarkDone = (id) => {
    setSamples(p => p.map(s => s.id===id ? {
      ...s,
      status:"done",
      resultDate: new Date().toISOString().slice(0,10),
      resultNote: resultNote,
      resultPdf: pdfData,
      resultPdfName: pdfName,
    } : s));
    setMarkingId(null);
    setResultNote("");
    setPdfData(null);
    setPdfName("");
  };

  const handlePdfUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // Allow any file type
    if (file.size > 10*1024*1024) { alert(ar?"الملف أكبر من 10MB":"File exceeds 10MB limit"); return; }
    const reader = new FileReader();
    reader.onload = (ev) => { setPdfData(ev.target.result); setPdfName(file.name); };
    reader.readAsDataURL(file);
  };

  // Pending row
  const PendingRow = ({s}) => {
    const isMarking = markingId === s.id;
    return (
      <div style={{borderBottom:"1px solid #f0f0f0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",gap:10}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontWeight:600,color:"#111",fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.patientName}</div>
            <div style={{fontSize:11,color:"#888",marginTop:1}}>{s.sampleCode} · {s.testType}</div>
            <div style={{fontSize:11,color:"#888",marginTop:1}}>{s.externalLab}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap",border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.statuses[s.status]}</span>
            <button onClick={()=>{ setMarkingId(isMarking?null:s.id); setResultNote(""); setPdfData(null); setPdfName(""); }}
              style={{background:isMarking?"#f1f5f9":"#f0fdf4",color:isMarking?"#374151":"#15803d",border:`1px solid ${isMarking?"#e2e8f0":"#86efac"}`,borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>
              {isMarking?(ar?"إلغاء":"Cancel"):(ar?"تسجيل النتيجة":"Mark Done")} {isMarking?"":"✓"}
            </button>
          </div>
        </div>

        {/* Mark done form */}
        {isMarking && (
          <div style={{padding:"0 16px 16px",background:"#fafafa",borderTop:"1px solid #f0f0f0"}}>
            <div style={{paddingTop:12}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>
                {ar?"ملاحظات النتيجة (اختياري)":"Result Notes (optional)"}
              </label>
              <textarea value={resultNote} onChange={e=>setResultNote(e.target.value)}
                placeholder={ar?"مثال: النتيجة طبيعية، يُنصح بالمتابعة...":"e.g. Normal result, follow-up recommended..."}
                rows={2} style={{...inp(),resize:"vertical",fontSize:13}}/>
            </div>

            <div style={{marginTop:12}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>
                📎 {ar?"رفع ملف النتيجة (اختياري)":"Upload Result File (optional)"}
              </label>
              <label style={{display:"flex",alignItems:"center",gap:10,background:"#ffffff",border:"1.5px dashed #d1d5db",borderRadius:8,padding:"10px 14px",cursor:"pointer",transition:"border-color .15s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#d1d5db"}>
                <span style={{fontSize:20}}>📄</span>
                <div>
                  <div style={{fontSize:13,color:"#111",fontWeight:500}}>{pdfData?pdfName:(ar?"اختر ملف PDF":"Choose PDF file")}</div>
                  <div style={{fontSize:11,color:"#aaa"}}>{ar?"PDF, صورة، أي ملف — حد أقصى 10MB":"PDF, image, any file — Max 10MB"}</div>
                </div>
                <input type="file" accept="*/*" onChange={handlePdfUpload} style={{display:"none"}}/>
              </label>
              {pdfData && (
                <div style={{marginTop:6,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{background:"#f5f5f7",color:"#15803d",borderRadius:6,padding:"3px 10px",fontSize:12}}>✓ {pdfName}</span>
                  <button onClick={()=>{setPdfData(null);setPdfName("");}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:13}}>✕</button>
                </div>
              )}
            </div>

            <button onClick={()=>handleMarkDone(s.id)}
              style={{marginTop:12,width:"100%",background:"#16a34a",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontSize:14,fontWeight:700}}>
              ✓ {ar?"تأكيد وصول النتيجة":"Confirm Result Received"}
            </button>
          </div>
        )}
      </div>
    );
  };

  // Done row
  const DoneRow = ({s}) => {
    const isViewing = viewingId === s.id;
    const [editing, setEditing] = React.useState(false);
    const [editNote, setEditNote] = React.useState(s.resultNote||"");
    const [editPdf, setEditPdf] = React.useState(s.resultPdf||null);
    const [editPdfName, setEditPdfName] = React.useState(s.resultPdfName||"");

    const saveEdit = () => {
      setSamples(p=>p.map(x=>x.id===s.id?{...x,resultNote:editNote,resultPdf:editPdf,resultPdfName:editPdfName}:x));
      setEditing(false);
    };
    const handleEditFile = (e) => {
      const file = e.target.files[0];
      if(!file) return;
      if(file.size>10*1024*1024){alert(ar?"الملف أكبر من 10MB":"File exceeds 10MB");return;}
      const reader = new FileReader();
      reader.onload = ev=>{setEditPdf(ev.target.result);setEditPdfName(file.name);};
      reader.readAsDataURL(file);
    };

    return (
      <div style={{borderBottom:"1px solid #f0f0f0"}}>
        {/* Row header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",gap:10}}>
          <div style={{minWidth:0,flex:1,cursor:"pointer"}} onClick={()=>{setViewingId(isViewing?null:s.id);setEditing(false);}}>
            <div style={{fontWeight:600,color:"#111",fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.patientName}</div>
            <div style={{fontSize:11,color:"#888",marginTop:1}}>{s.sampleCode} · {s.testType}</div>
            {s.resultDate && <div style={{fontSize:11,color:"#888",marginTop:1}}>✓ {s.resultDate}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            {s.resultPdf && <span style={{background:"#fafafa",border:"1px solid #e5e5e5",color:"#555",borderRadius:6,padding:"2px 7px",fontSize:10}}>📎</span>}
            {s.resultNote && <span style={{background:"#fafafa",border:"1px solid #e5e5e5",color:"#555",borderRadius:6,padding:"2px 7px",fontSize:10}}>📝</span>}
            <button onClick={()=>{setEditing(e=>!e);setViewingId(s.id);setEditNote(s.resultNote||"");setEditPdf(s.resultPdf||null);setEditPdfName(s.resultPdfName||"");}}
              style={{background:editing?"#111":"#fafafa",color:editing?"#fff":"#555",border:"1px solid #e5e5e5",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>
              {editing?(ar?"إغلاق":"Close"):(ar?"تعديل":"Edit")}
            </button>
            <span style={{color:"#aaa",fontSize:13,cursor:"pointer"}} onClick={()=>setViewingId(isViewing?null:s.id)}>{isViewing?"▲":"▼"}</span>
          </div>
        </div>

        {/* Content when expanded */}
        {isViewing && (
          <div style={{padding:"0 16px 16px",background:"#fafafa",borderTop:"1px solid #f0f0f0"}}>
            {editing ? (
              /* ── Edit mode ── */
              <div style={{paddingTop:12}}>
                <div style={{fontSize:11,fontWeight:600,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12}}>
                  {ar?"تعديل النتيجة":"Edit Result"}
                </div>
                <div style={{marginBottom:12}}>
                  <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>{ar?"الملاحظات":"Notes"}</label>
                  <textarea value={editNote} onChange={e=>setEditNote(e.target.value)} rows={3}
                    style={{...inp(),resize:"vertical",fontSize:13}}
                    placeholder={ar?"أضف ملاحظات على النتيجة...":"Add result notes..."}/>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>
                    📎 {ar?"رفع ملف":"Upload File"}
                  </label>
                  <label style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:"1.5px dashed #d1d5db",borderRadius:8,padding:"10px 14px",cursor:"pointer"}}>
                    <span style={{fontSize:20}}>📎</span>
                    <div>
                      <div style={{fontSize:13,color:"#111",fontWeight:500}}>{editPdf?editPdfName:(ar?"اختر ملف":"Choose File")}</div>
                      <div style={{fontSize:11,color:"#aaa"}}>{ar?"PDF، صورة، أي ملف — 10MB":"PDF, image, any file — 10MB"}</div>
                    </div>
                    <input type="file" accept="*/*" onChange={handleEditFile} style={{display:"none"}}/>
                  </label>
                  {editPdf && (
                    <div style={{marginTop:6,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:"#555"}}>✓ {editPdfName}</span>
                      <button onClick={()=>{setEditPdf(null);setEditPdfName("");}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:13}}>✕</button>
                    </div>
                  )}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setEditing(false)} style={{background:"#fafafa",border:"1px solid #e5e5e5",color:"#888",borderRadius:7,padding:"8px 16px",cursor:"pointer",fontSize:13}}>
                    {ar?"إلغاء":"Cancel"}
                  </button>
                  <button onClick={saveEdit} style={{background:"#111",color:"#fff",border:"none",borderRadius:7,padding:"8px 20px",cursor:"pointer",fontSize:13,fontWeight:600}}>
                    ✓ {ar?"حفظ التعديل":"Save"}
                  </button>
                </div>
              </div>
            ) : (
              /* ── View mode ── */
              <div>
                {s.resultNote && (
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:4}}>{ar?"الملاحظات":"Notes"}</div>
                    <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:8,padding:"10px 12px",fontSize:13,color:"#111",lineHeight:1.6}}>{s.resultNote}</div>
                  </div>
                )}
                {s.resultPdf && (
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>📎 {s.resultPdfName}</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <a href={s.resultPdf} download={s.resultPdfName}
                        style={{background:"#fff",color:"#111",border:"1px solid #e5e5e5",borderRadius:7,padding:"7px 14px",fontSize:13,fontWeight:600,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6}}>
                        ⬇ {ar?"تحميل":"Download"}
                      </a>
                      <a href={s.resultPdf} target="_blank" rel="noreferrer"
                        style={{background:"#fafafa",color:"#555",border:"1px solid #e5e5e5",borderRadius:7,padding:"7px 14px",fontSize:13,fontWeight:600,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6}}>
                        👁 {ar?"عرض":"View"}
                      </a>
                    </div>
                  </div>
                )}
                {!s.resultNote && !s.resultPdf && (
                  <div style={{marginTop:12,color:"#aaa",fontSize:12,textAlign:"center",padding:"8px 0"}}>
                    {ar?"لا توجد ملاحظات أو ملفات — اضغط تعديل للإضافة":"No notes or files — click Edit to add"}
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      <h2 style={{color:"#111",fontSize:mob?17:21,fontWeight:700,marginBottom:20,letterSpacing:"-0.4px"}}>{t.nav.results}</h2>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ..."
        style={{width:"100%",boxSizing:"border-box",...inp(),padding:"10px 14px",marginBottom:16}}/>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:16}}>
        <div style={{background:"#ffffff",border:"1px solid #e5e5e5",borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid #f0f0f0",background:"#fafafa",fontWeight:700,color:"#ef4444",fontSize:14}}>
            ⏳ {ar?"في الانتظار":"Pending"} ({filtered(pending).length})
          </div>
          <div style={{maxHeight:600,overflowY:"auto"}}>
            {filtered(pending).length===0
              ? <div style={{padding:24,textAlign:"center",color:"#888",fontSize:13}}>✓ {ar?"لا توجد عينات معلقة":"No pending samples"}</div>
              : filtered(pending).map(s=><PendingRow key={s.id} s={s}/>)
            }
          </div>
        </div>
        <div style={{background:"#ffffff",border:"1px solid #e5e5e5",borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid #f0f0f0",background:"#fafafa",fontWeight:700,color:"#15803d",fontSize:14}}>
            ✅ {ar?"نتائج وصلت":"Results In"} ({filtered(done).length})
          </div>
          <div style={{maxHeight:600,overflowY:"auto"}}>
            {filtered(done).length===0
              ? <div style={{padding:24,textAlign:"center",color:"#888",fontSize:13}}>{ar?"لا توجد نتائج بعد":"No results yet"}</div>
              : filtered(done).map(s=><DoneRow key={s.id} s={s}/>)
            }
          </div>
        </div>
      </div>
    </div>
  );
}


// ─── ShipmentsPage ────────────────────────────────────────────────────────────
function ShipmentsPage({ t, samples, setSamples }) {
  const mob = useIsMobile();
  const ar = t.dir === "rtl";
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [showNewModal, setShowNewModal] = useState(false);
  const [editModal, setEditModal] = useState(null);        // shipNum being edited
  const [newShipId, setNewShipId] = useState("");
  const [selectedPatients, setSelectedPatients] = useState([]);
  const [patientSearch, setPatientSearch] = useState("");
  const [editingShipment, setEditingShipment] = useState(null);
  const [newShipNum, setNewShipNum] = useState("");
  const [editShipId, setEditShipId] = useState("");        // rename shipment number

  // Group samples by shipmentNumber
  const shipmentMap = {};
  samples.forEach(s => {
    const key = s.shipmentNumber?.trim();
    if (!key) return;
    if (!shipmentMap[key]) shipmentMap[key] = [];
    shipmentMap[key].push(s);
  });

  // Unassigned samples
  const unassigned = samples.filter(s => !s.shipmentNumber?.trim());

  const shipmentKeys = Object.keys(shipmentMap)
    .filter(k => !search || k.toLowerCase().includes(search.toLowerCase()) ||
      shipmentMap[k].some(s => s.patientName?.toLowerCase().includes(search.toLowerCase())))
    .sort((a,b) => a.localeCompare(b));

  const updateSampleShipment = (id, newNum) => {
    setSamples(p => p.map(s => s.id===id ? {...s, shipmentNumber: newNum.trim()} : s));
    setEditingShipment(null);
    setNewShipNum("");
  };

  const statusCounts = (samps) => {
    const counts = {};
    samps.forEach(s => { counts[s.status] = (counts[s.status]||0)+1; });
    return counts;
  };

  const createShipment = () => {
    if (!newShipId.trim() || selectedPatients.length === 0) return;
    setSamples(p => p.map(s =>
      selectedPatients.includes(s.id) ? {...s, shipmentNumber: newShipId.trim()} : s
    ));
    setShowNewModal(false);
    setNewShipId("");
    setSelectedPatients([]);
    setPatientSearch("");
    setSelected(newShipId.trim());
  };

  const togglePatient = (id) => {
    setSelectedPatients(p => p.includes(id) ? p.filter(x=>x!==id) : [...p, id]);
  };

  const openEdit = (shipNum) => {
    const currentIds = (shipmentMap[shipNum]||[]).map(s=>s.id);
    setEditModal(shipNum);
    setEditShipId(shipNum);
    setSelectedPatients(currentIds);
    setPatientSearch("");
  };

  const saveEdit = () => {
    if (!editShipId.trim()) return;
    setSamples(p => p.map(s => {
      const wasInShipment = s.shipmentNumber === editModal;
      const isSelected = selectedPatients.includes(s.id);
      if (wasInShipment && !isSelected) return {...s, shipmentNumber:""};          // removed
      if (!wasInShipment && isSelected) return {...s, shipmentNumber:editShipId.trim()}; // added
      if (wasInShipment && isSelected) return {...s, shipmentNumber:editShipId.trim()}; // renamed
      return s;
    }));
    setEditModal(null);
    setSelectedPatients([]);
    setPatientSearch("");
    setSelected(editShipId.trim());
  };

  const deleteShipment = (shipNum) => {
    if (!window.confirm(ar?`هل تريد حذف الشحنة ${shipNum}؟`:`Delete shipment ${shipNum}?`)) return;
    setSamples(p => p.map(s => s.shipmentNumber===shipNum ? {...s, shipmentNumber:""} : s));
    if (selected===shipNum) setSelected(null);
    setEditModal(null);
  };

  // Patients available to add (not yet in a shipment, or in any shipment)
  const availablePatients = samples.filter(s =>
    !patientSearch ||
    s.patientName?.toLowerCase().includes(patientSearch.toLowerCase()) ||
    s.sampleCode?.toLowerCase().includes(patientSearch.toLowerCase())
  );

  const ShipmentCard = ({shipNum, samps}) => {
    const isSelected = selected === shipNum;
    const counts = statusCounts(samps);
    const labs = [...new Set(samps.map(s=>s.externalLab?.split("—")[0]?.trim()).filter(Boolean))];
    const overdue = samps.filter(s=>s.status==="overdue").length;
    return (
      <div style={{background:"#ffffff",border:`1.5px solid ${isSelected?"#6366f1":"#e2e8f0"}`,borderRadius:12,overflow:"hidden",marginBottom:12,transition:"border-color .15s"}}>
        {/* Shipment header */}
        <div style={{padding:"14px 16px",background:isSelected?"#eef2ff":"#f8fafc",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}
          onClick={()=>setSelected(isSelected?null:shipNum)}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            <div style={{width:36,height:36,borderRadius:10,background:isSelected?"#6366f1":"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
              🚚
            </div>
            <div style={{minWidth:0}}>
              <div style={{fontWeight:700,fontSize:15,color:isSelected?"#4f46e5":"#000000",fontFamily:"monospace"}}>{shipNum}</div>
              <div style={{fontSize:11,color:"#888",marginTop:1}}>{samps.length} {ar?"مريض":"patients"} · {labs.join(", ")}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            {overdue>0 && <span style={{background:"#fafafa",color:"#be123c",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>⚠{overdue}</span>}
            <span style={{background:"#f5f5f7",color:"#15803d",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}}>{counts.done||0} ✓</span>
            <button onClick={e=>{e.stopPropagation();openEdit(shipNum);}}
              style={{background:"#f5f5f7",color:"#111",border:"1px solid #e5e5e5",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>
              ✏ {ar?"تعديل":"Edit"}
            </button>
            <span style={{color:"#aaa",fontSize:14}}>{isSelected?"▲":"▼"}</span>
          </div>
        </div>

        {/* Patients list */}
        {isSelected && (
          <div>
            {/* Status summary bar */}
            <div style={{display:"flex",gap:6,padding:"10px 16px",borderBottom:"1px solid #f0f0f0",flexWrap:"wrap"}}>
              {Object.entries(SC).map(([status,color])=> counts[status] ? (
                <span key={status} style={{background:color+"22",color:color,borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:600}}>
                  {t.statuses[status]}: {counts[status]}
                </span>
              ) : null)}
            </div>

            {/* Patient rows */}
            {samps.map((s,i)=>(
              <div key={s.id} style={{padding:"11px 16px",borderBottom:i<samps.length-1?"1px solid #f8fafc":"none",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontWeight:600,color:"#111",fontSize:13}}>{s.patientName}</div>
                  <div style={{fontSize:11,color:"#888",marginTop:1,display:"flex",gap:8,flexWrap:"wrap"}}>
                    <span>{s.sampleCode}</span>
                    <span>·</span>
                    <span>{s.testType}</span>
                    {s.collectDate && <><span>·</span><span>📅 {s.collectDate}</span></>}
                  </div>
                  <div style={{fontSize:11,color:"#aaa",marginTop:1}}>{s.externalLab}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap",border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.statuses[s.status]}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* ── Edit Shipment Modal ── */}
      {editModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:520,maxHeight:"85vh",boxShadow:"0 24px 60px rgba(0,0,0,0.15)",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div style={{padding:"18px 20px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h3 style={{margin:0,fontSize:17,fontWeight:700,color:"#111"}}>✏ {ar?"تعديل الشحنة":"Edit Shipment"}: <span style={{color:"#111",fontFamily:"monospace"}}>{editModal}</span></h3>
              <button onClick={()=>{setEditModal(null);setSelectedPatients([]);setPatientSearch("");}}
                style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#aaa",lineHeight:1}}>×</button>
            </div>

            {/* Rename shipment number */}
            <div style={{padding:"14px 20px",borderBottom:"1px solid #f0f0f0"}}>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:"#555",marginBottom:6}}>
                {ar?"رقم الشحنة":"Shipment Number"}
              </label>
              <input value={editShipId} onChange={e=>setEditShipId(e.target.value)}
                style={{...inp(),fontFamily:"monospace"}}/>
            </div>

            {/* Patient search */}
            <div style={{padding:"12px 20px",borderBottom:"1px solid #f0f0f0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <label style={{fontSize:13,fontWeight:600,color:"#555"}}>
                  {ar?"المرضى في هذه الشحنة":"Patients in this shipment"}
                  <span style={{background:"#111",color:"#fff",borderRadius:12,padding:"1px 8px",fontSize:11,marginInlineStart:8}}>{selectedPatients.length}</span>
                </label>
              </div>
              <input value={patientSearch} onChange={e=>setPatientSearch(e.target.value)}
                placeholder={ar?"🔍 ابحث باسم المريض...":"🔍 Search patient..."}
                style={{...inp(),padding:"8px 12px",fontSize:13}}/>
            </div>

            {/* Patients list */}
            <div style={{overflowY:"auto",flex:1}}>
              {samples.filter(s=>!patientSearch||s.patientName?.toLowerCase().includes(patientSearch.toLowerCase())||s.sampleCode?.toLowerCase().includes(patientSearch.toLowerCase())).map(s=>{
                const checked = selectedPatients.includes(s.id);
                const inOther = s.shipmentNumber && s.shipmentNumber!==editModal;
                return (
                  <div key={s.id} onClick={()=>togglePatient(s.id)}
                    style={{display:"flex",alignItems:"center",gap:12,padding:"11px 20px",cursor:"pointer",background:checked?"#eef2ff":"#ffffff",borderBottom:"1px solid #f0f0f0",transition:"background .1s",opacity:inOther?0.5:1}}
                    onMouseEnter={e=>{if(!checked)e.currentTarget.style.background="#f8fafc"}}
                    onMouseLeave={e=>{if(!checked)e.currentTarget.style.background=checked?"#eef2ff":"#ffffff"}}>
                    <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${checked?"#6366f1":"#d1d5db"}`,background:checked?"#6366f1":"#ffffff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                      {checked && <span style={{color:"#fff",fontSize:13,lineHeight:1}}>✓</span>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,color:"#111",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.patientName}</div>
                      <div style={{fontSize:11,color:"#888",marginTop:1}}>{s.sampleCode} · {s.testType}</div>
                    </div>
                    <div style={{flexShrink:0,textAlign:"end"}}>
                      <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)"}}>{t.statuses[s.status]}</span>
                      {inOther && <div style={{fontSize:10,color:"#aaa",marginTop:2}}>{s.shipmentNumber}</div>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Footer */}
            <div style={{padding:"14px 20px",borderTop:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <button onClick={()=>deleteShipment(editModal)}
                style={{background:"#fafafa",color:"#be123c",border:"1px solid #e5e5e5",borderRadius:9,padding:"10px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>
                🗑 {ar?"حذف الشحنة":"Delete"}
              </button>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setEditModal(null);setSelectedPatients([]);setPatientSearch("");}}
                  style={{background:"#fafafa",color:"#555",border:"none",borderRadius:9,padding:"10px 18px",cursor:"pointer",fontSize:14}}>
                  {ar?"إلغاء":"Cancel"}
                </button>
                <button onClick={saveEdit}
                  disabled={!editShipId.trim()}
                  style={{background:editShipId.trim()?"#6366f1":"#a5b4fc",color:"#fff",border:"none",borderRadius:9,padding:"10px 22px",cursor:editShipId.trim()?"pointer":"default",fontSize:14,fontWeight:700}}>
                  ✓ {ar?"حفظ التعديلات":"Save Changes"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── New Shipment Modal ── */}
      {showNewModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:520,maxHeight:"85vh",boxShadow:"0 24px 60px rgba(0,0,0,0.15)",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>

            {/* Modal header */}
            <div style={{padding:"18px 20px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h3 style={{margin:0,fontSize:17,fontWeight:700,color:"#111"}}>🚚 {ar?"شحنة جديدة":"New Shipment"}</h3>
              <button onClick={()=>{setShowNewModal(false);setNewShipId("");setSelectedPatients([]);setPatientSearch("");}}
                style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#aaa",lineHeight:1}}>×</button>
            </div>

            {/* Shipment number input */}
            <div style={{padding:"16px 20px",borderBottom:"1px solid #f0f0f0"}}>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:"#555",marginBottom:6}}>
                {ar?"رقم الشحنة *":"Shipment Number *"}
              </label>
              <input value={newShipId} onChange={e=>setNewShipId(e.target.value)}
                placeholder={ar?"مثال: SHP-2024-001":"e.g. SHP-2024-001"}
                style={{...inp(),fontFamily:"monospace"}}/>
            </div>

            {/* Patient search */}
            <div style={{padding:"12px 20px",borderBottom:"1px solid #f0f0f0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <label style={{fontSize:13,fontWeight:600,color:"#555"}}>
                  {ar?"اختر المرضى":"Select Patients"}
                  {selectedPatients.length>0 && <span style={{background:"#111",color:"#fff",borderRadius:12,padding:"1px 8px",fontSize:11,marginInlineStart:8}}>{selectedPatients.length}</span>}
                </label>
                {selectedPatients.length>0 && (
                  <button onClick={()=>setSelectedPatients([])} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:12}}>
                    {ar?"إلغاء الكل":"Clear all"}
                  </button>
                )}
              </div>
              <input value={patientSearch} onChange={e=>setPatientSearch(e.target.value)}
                placeholder={ar?"🔍 ابحث باسم المريض أو الكود...":"🔍 Search patient or code..."}

            </div>

            {/* Patients list */}
            <div style={{overflowY:"auto",flex:1}}>
              {availablePatients.length===0 && (
                <div style={{padding:24,textAlign:"center",color:"#aaa",fontSize:13}}>{ar?"لا توجد نتائج":"No results"}</div>

                return (
                  <div key={s.id} onClick={()=>togglePatient(s.id)}

                    onMouseEnter={e=>{if(!checked)e.currentTarget.style.background="#f8fafc"}}
                    onMouseLeave={e=>{if(!checked)e.currentTarget.style.background="#ffffff"}}>
                    {/* Checkbox */}
                    <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${checked?"#6366f1":"#d1d5db"}`,background:checked?"#6366f1":"#ffffff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                      {checked && <span style={{color:"#fff",fontSize:13,lineHeight:1}}>✓</span>}

                      <div style={{fontWeight:600,color:"#111",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.patientName}</div>

          {ar?"لا توجد نتائج":"No results found"}
        </div>
      )}

        <ShipmentCard key={key} shipNum={key} samps={shipmentMap[key]}/>

      {unassigned.length>0 && !search && (
        <div style={{marginTop:8}}>
          <div style={{fontSize:13,color:"#aaa",fontWeight:600,marginBottom:10,paddingBottom:8,borderBottom:"1px dashed #e2e8f0"}}>
