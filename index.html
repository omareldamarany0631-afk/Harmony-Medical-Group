                <div style={{fontWeight:600,color:"#111",fontSize:13}}>{s.patientName}</div>
                <div style={{fontSize:11,color:"#aaa",marginTop:1}}>{s.sampleCode} · {s.testType}</div>
              </div>
              {editingShipment===s.id ? (
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <input value={newShipNum} onChange={e=>setNewShipNum(e.target.value)}
                    placeholder={ar?"رقم الشحنة":"Shipment #"}
                    style={{...inp(),padding:"5px 10px",width:130,fontSize:12}}
                    onKeyDown={e=>e.key==="Enter"&&newShipNum.trim()&&updateSampleShipment(s.id,newShipNum)}/>
                  <button onClick={()=>newShipNum.trim()&&updateSampleShipment(s.id,newShipNum)}
                    style={{background:"#111",color:"#fff",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:12}}>✓</button>
                  <button onClick={()=>{setEditingShipment(null);setNewShipNum("");}}
                    style={{background:"#fafafa",color:"#555",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              ) : (
                <button onClick={()=>{setEditingShipment(s.id);setNewShipNum("");}}
                  style={{background:"#fafafa",color:"#888",border:"1px solid #e2e8f0",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:12,flexShrink:0,whiteSpace:"nowrap"}}>
                  + {ar?"أضف رقم شحنة":"Add shipment #"}
                </button>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── AddTestPage ──────────────────────────────────────────────────────────────
function AddTestPage({ t }) {
  const mob = useIsMobile();
  const [tests, setTests] = useState(() => {
    try { return JSON.parse(localStorage.getItem("harmony_custom_tests") || "[]"); } catch { return []; }
  });
  useEffect(()=>{
    loadFromCloud("custom_tests").then(v=>{ if(Array.isArray(v)&&v.length>0) setTests(v); });
  },[]);
  const [form, setForm] = useState({ name:"", tat:"", price:"", lab:"" });
  const [saved, setSaved] = useState(false);

  const save = () => {
    if (!form.name.trim()) return;
    const updated = [...tests, {...form, id: Date.now()}];
    setTests(updated);
    saveToCloud("custom_tests", updated);
    setForm({name:"",tat:"",price:"",lab:""});
    setSaved(true); setTimeout(()=>setSaved(false), 2000);
  };
  const del = (id) => {
    const updated = tests.filter(t=>t.id!==id);
    setTests(updated);
    try { localStorage.setItem("harmony_custom_tests", JSON.stringify(updated)); } catch {}
  };

  return (
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <h2 style={{color:"#111",fontSize:mob?17:21,fontWeight:700,marginBottom:20,letterSpacing:"-0.4px"}}>🔬 {t.nav.addTest}</h2>
      {saved && <div style={{background:"#f5f5f7",border:"1px solid #e5e5e5",borderRadius:10,padding:"12px 16px",marginBottom:16,color:"#15803d",fontWeight:600}}>✓ {t.dir==="rtl"?"تم الحفظ":"Saved!"}</div>}
      <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:14,padding:mob?16:24,marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:"0 18px"}}>
          <Field label={t.dir==="rtl"?"اسم الفحص *":"Test Name *"}>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder={t.dir==="rtl"?"مثال: Vitamin C":"e.g. Vitamin C"} style={inp()}/>
          </Field>
          <Field label={t.dir==="rtl"?"وقت الاستلام (TAT)":"Turnaround Time (TAT)"}>
            <input value={form.tat} onChange={e=>setForm(f=>({...f,tat:e.target.value}))} placeholder={t.dir==="rtl"?"مثال: 7-10 أيام":"e.g. 7-10 days"} style={inp()}/>
          </Field>
          <Field label={t.dir==="rtl"?"السعر (EGP)":"Price (EGP)"}>
            <input type="number" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="0" style={inp()}/>
          </Field>
          <Field label={t.dir==="rtl"?"المعمل":"Lab"}>
            <input value={form.lab} onChange={e=>setForm(f=>({...f,lab:e.target.value}))} placeholder={t.dir==="rtl"?"اسم المعمل":"Lab name"} style={inp()}/>
          </Field>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:16,paddingTop:16,borderTop:"1px solid #f0f0f0"}}>
          <button onClick={save} style={{background:"#111",color:"#fff",border:"none",borderRadius:8,padding:"11px 28px",cursor:"pointer",fontSize:14,fontWeight:600}}>
            + {t.nav.addTest}
          </button>
        </div>
      </div>
      {/* Tests saved - no list shown here, they appear in Test Type dropdown */}
      {saved && tests.length > 0 && (
        <div style={{padding:"10px 14px",background:"#fafafa",border:"1px solid #ebebeb",borderRadius:8,fontSize:12,color:"#888",display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"#22c55e"}}>✓</span>
          {t.dir==="rtl"?`تم إضافة "${tests[tests.length-1]?.name}" — ستظهر في قائمة نوع الفحص`:`"${tests[tests.length-1]?.name}" added — now available in Test Type dropdown`}
        </div>
      )}
    </div>
  );
}




// ─── InvoicePage ──────────────────────────────────────────────────────────────
function InvoicePage({ t, samples, setSamples, isAdmin }) {
  const mob = useIsMobile();
  const ar = t.dir === "rtl";
  const now = new Date();
  const [dateFrom, setDateFrom] = React.useState("");
  const [dateTo,   setDateTo]   = React.useState("");
  const [client,   setClient]   = React.useState("all");
  const [editClient, setEditClient] = React.useState(null);
  const [editItems,  setEditItems]  = React.useState(null);

  // Invoice can group by Client (hospital) OR External Lab
  const [groupBy, setGroupBy] = React.useState("client"); // "client" | "lab"

  const allClients = [...new Set(samples.map(s=>s.hospital).filter(Boolean))].sort();
  const allLabs    = [...new Set(samples.map(s=>s.externalLab).filter(Boolean))].sort();

  const filtered = samples.filter(s => {
    const d = s.collectDate || s.sentDate;
    const groupKey = groupBy==="client" ? s.hospital : s.externalLab;
    if (client !== "all" && groupKey !== client) return false;
    if (dateFrom && d && d < dateFrom) return false;
    if (dateTo   && d && d > dateTo)   return false;
    return true;
  });

  const byClient = {};
  filtered.forEach(s => {
    const c = groupBy==="client"
      ? (s.hospital || (ar ? "غير محدد" : "Unassigned"))
      : (s.externalLab || (ar ? "غير محدد" : "Unassigned"));
    if (!byClient[c]) byClient[c] = [];
    byClient[c].push(s);
  });

  const groupOptions = groupBy==="client"
    ? [{value:"all",label:ar?"كل العملاء":"All Clients"}, ...allClients.map(c=>({value:c,label:c}))]
    : [{value:"all",label:ar?"كل المعامل":"All Labs"}, ...allLabs.map(c=>({value:c,label:c}))];

  const openEdit = (name) => {
    setEditClient(name);
    setEditItems((byClient[name]||[]).map(s=>({...s,_include:true})));
  };

  const toggleItem = (id) => setEditItems(p=>p.map(x=>x.id===id?{...x,_include:!x._include}:x));
  const updateField = (id, field, val) => setEditItems(p=>p.map(x=>x.id===id?{...x,[field]:val}:x));

  const saveEdit = () => {
    if (!editItems) return;
    setSamples(prev => prev.map(s => {
      const u = editItems.find(x=>x.id===s.id);
      if (!u) return s;
      return {...s, salePrice:u.salePrice, labCost:u.labCost, paymentStatus:u.paymentStatus};
    }));
    setEditClient(null); setEditItems(null);
  };

  const printInvoice = (name, items) => {
    const win = window.open("","_blank");
    const revenue = items.reduce((a,s)=>a+Number(s.salePrice||0),0);
    const paid    = items.reduce((a,s)=>a+Number(s.deposit||0),0);
    const remaining = revenue - paid;
    const invNum = "INV-" + Date.now().toString().slice(-6);
    const rows = items.map((s,i)=>`<tr>
      <td style="color:#888;font-size:12px">${i+1}</td>
      <td><strong>${s.patientName}</strong></td>
      <td style="font-family:monospace;font-size:11px;color:#555">${s.sampleCode}</td>
      <td style="font-size:12px">${s.testType}</td>
      <td style="font-size:12px;color:#555">${s.collectDate||s.sentDate||""}</td>
      <td style="text-align:end;font-weight:700">${fmt(s.salePrice)} EGP</td>
      <td style="text-align:center"><span style="border:1px solid #000;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px">${t.payStatus[s.paymentStatus]||s.paymentStatus}</span></td>
    </tr>`).join("");
    win.document.write(`<!DOCTYPE html><html dir="${ar?"rtl":"ltr"}"><head><meta charset="utf-8">
    <title>Invoice ${invNum}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:${ar?"Cairo":"Inter"},Arial,sans-serif;padding:40px;color:#000;max-width:860px;margin:0 auto;font-size:13px;background:#fff}
      .top{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:20px;border-bottom:2.5px solid #000;margin-bottom:28px}
      .brand{font-size:22px;font-weight:700;letter-spacing:-0.5px}
      .brand-sub{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
      .inv-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
      .inv-num{font-size:20px;font-weight:700}
      .billto{margin-bottom:24px}
      .billto-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;font-weight:600}
      .billto-name{font-size:18px;font-weight:700}
      .summary{display:grid;grid-template-columns:repeat(3,1fr);border:1.5px solid #000;margin-bottom:28px}
      .sum-item{padding:14px 16px;border-right:1px solid #000}
      .sum-item:last-child{border-right:none}
      .sum-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#666;margin-bottom:5px;font-weight:600}
      .sum-val{font-size:16px;font-weight:700}
      table{width:100%;border-collapse:collapse}
      thead tr{border-top:2px solid #000;border-bottom:2px solid #000}
      th{padding:10px 12px;text-align:start;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
      td{padding:10px 12px;border-bottom:1px solid #e5e5e5}
      .tfoot-row{border-top:2px solid #000;border-bottom:2px solid #000}
      .tfoot-row td{padding:12px;font-weight:700;font-size:14px}
      .footer{margin-top:28px;padding-top:14px;border-top:1px solid #ccc;display:flex;justify-content:space-between;font-size:10px;color:#999}
      @media print{.no-print{display:none!important} @page{margin:12mm;size:A4} body{padding:0}}
    </style></head><body>
    <div class="top">
      <div>
        <div class="brand">Involve Out</div>
        <div class="brand-sub">${ar?"نظام إدارة العينات":"Sample Management System"}</div>
      </div>
      <div style="text-align:end">
        <div class="inv-label">${ar?"فاتورة":"Invoice"}</div>
        <div class="inv-num">${invNum}</div>
        <div style="font-size:11px;color:#666;margin-top:4px">${dateFrom} — ${dateTo}</div>
      </div>
    </div>
    <div class="billto">
      <div class="billto-label">${ar?"صادر إلى":"Bill To"}</div>
      <div class="billto-name">${name}</div>
    </div>
    <div class="summary">
      <div class="sum-item"><div class="sum-label">${ar?"الإجمالي":"Total"}</div><div class="sum-val">${fmt(revenue)} EGP</div></div>
      <div class="sum-item"><div class="sum-label">${ar?"المدفوع":"Paid"}</div><div class="sum-val">${fmt(paid)} EGP</div></div>
      <div class="sum-item"><div class="sum-label">${ar?"المتبقي":"Balance"}</div><div class="sum-val">${fmt(remaining)} EGP</div></div>
    </div>
    <table>
      <thead><tr>
        <th style="width:28px">#</th>
        <th>${ar?"المريض":"Patient"}</th>
        <th>${ar?"الكود":"Code"}</th>
        <th>${ar?"الفحص":"Test"}</th>
        <th>${ar?"التاريخ":"Date"}</th>
        <th style="text-align:end">${ar?"المبلغ":"Amount"}</th>
        <th style="text-align:center">${ar?"الحالة":"Status"}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="tfoot-row">
        <td colspan="5">${ar?"الإجمالي":"Total"} — ${items.length} ${ar?"عينة":"items"}</td>
        <td style="text-align:end">${fmt(revenue)} EGP</td>
        <td></td>
      </tr></tfoot>
    </table>
    <div class="footer">
      <span>Involve Out · ${new Date().getFullYear()}</span>
      <span>${invNum}</span>
    </div>
    <div style="text-align:center;margin-top:24px" class="no-print">
      <button onclick="window.print()" style="background:#000;color:#fff;border:none;padding:11px 32px;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;letter-spacing:0.3px">
        ${ar?"طباعة / حفظ PDF":"Print / Save as PDF"}
      </button>
    </div>
    </body></html>`);
    win.document.close();
  };

  return (
    <div>
      <h2 style={{color:"#111",fontSize:mob?17:21,fontWeight:700,marginBottom:20,letterSpacing:"-0.4px"}}>🧾 {t.nav.invoice}</h2>

      {/* Filters */}
      <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,padding:"14px 16px",marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr 1fr",gap:12,alignItems:"end"}}>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>📅 {ar?"من":"From"}</label>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{...inp(),padding:"9px 12px",fontSize:13}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>📅 {ar?"إلى":"To"}</label>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{...inp(),padding:"9px 12px",fontSize:13}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>👥 {ar?"العميل":"Client"}</label>
            <CustomSelect
              value={client}
              onChange={v=>setClient(v)}
              options={[{value:"all",label:ar?"كل العملاء":"All Clients"},...allClients.map(c=>({value:c,label:c}))]}
            />
          </div>
        </div>
        <div style={{marginTop:12,display:"flex",gap:10,flexWrap:"wrap"}}>
          {[[ar?"إجمالي العينات":"Samples",filtered.length,"#6366f1"],[ar?"عملاء":"Clients",Object.keys(byClient).length,"#10b981"],[ar?"الإيرادات":"Revenue",fmt(filtered.reduce((a,s)=>a+Number(s.salePrice||0),0))+" EGP","#8b5cf6"]].map(([l,v,c],i)=>(
            <div key={i} style={{background:c+"11",border:"1px solid #ebebeb",borderRadius:8,padding:"8px 16px",flex:1,minWidth:90}}>
              <div style={{fontWeight:700,color:c,fontSize:15}}>{v}</div>
              <div style={{fontSize:11,color:"#888",marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Per-client invoices */}
      {Object.keys(byClient).length===0 ? (
        <div style={{textAlign:"center",padding:48,color:"#aaa"}}>
          <div style={{fontSize:36,marginBottom:12}}>🧾</div>
          <div style={{fontSize:15,fontWeight:600,color:"#888"}}>{ar?"لا توجد بيانات في هذه الفترة":"No data found for this period"}</div>
        </div>
      ) : Object.entries(byClient).map(([name,items])=>{
        const isEditing = editClient===name && editItems;
        const displayItems = isEditing ? editItems : items;
        const activeItems = isEditing ? editItems.filter(x=>x._include) : items;
        const revenue   = activeItems.reduce((a,s)=>a+Number(s.salePrice||0),0);
        const paid      = activeItems.reduce((a,s)=>a+Number(s.deposit||0),0);
        const remaining = revenue - paid;

        return (
          <div key={name} style={{background:"#fff",border:`1px solid ${isEditing?"#6366f1":"#e2e8f0"}`,borderRadius:16,marginBottom:20,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>

            {/* Invoice header */}
            <div style={{background:"#111",padding:"18px 22px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div>
                <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginBottom:3}}>🧾 {ar?"فاتورة":"INVOICE"} · {dateFrom} → {dateTo}</div>
                <div style={{color:"#fff",fontWeight:700,fontSize:18}}>{name}</div>
                <div style={{color:"rgba(255,255,255,0.75)",fontSize:12,marginTop:2}}>{activeItems.length} {ar?"عينة":"samples"}</div>
              </div>
              <div style={{textAlign:"end"}}>
                <div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{ar?"الإجمالي":"Total"}</div>
                <div style={{color:"#fff",fontWeight:700,fontSize:22}}>{fmt(revenue)} EGP</div>
                <div style={{color:remaining>0?"#fca5a5":"#86efac",fontSize:12,marginTop:2}}>
                  {remaining>0?`${ar?"متبقي":"Remaining"}: ${fmt(remaining)} EGP`:`✓ ${ar?"مدفوع بالكامل":"Fully Paid"}`}
                </div>
              </div>
            </div>

            {/* Action bar */}
            <div style={{background:"#fafafa",borderBottom:"1px solid #f0f0f0",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div style={{fontSize:12,color:"#888"}}>
                {isEditing?(ar?"✏ اختر العينات وعدّل الأسعار وحالة الدفع":"✏ Toggle items & edit prices/payment"):(ar?"اضغط تعديل لتخصيص الفاتورة":"Click Edit to customize")}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {isEditing ? <>
                  <button onClick={()=>{setEditClient(null);setEditItems(null);}} style={{background:"#fafafa",color:"#555",border:"none",borderRadius:7,padding:"6px 14px",cursor:"pointer",fontSize:12}}>{ar?"إلغاء":"Cancel"}</button>
                  <button onClick={saveEdit} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:7,padding:"6px 16px",cursor:"pointer",fontSize:12,fontWeight:700}}>✓ {ar?"حفظ":"Save"}</button>
                </> : (
                  <button onClick={()=>openEdit(name)} style={{background:"#f5f5f7",color:"#111",border:"1px solid #e5e5e5",borderRadius:7,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:600}}>✏ {ar?"تعديل":"Edit"}</button>
                )}
                <button onClick={()=>printInvoice(name,activeItems)} style={{background:"#111",color:"#fff",border:"none",borderRadius:7,padding:"6px 16px",cursor:"pointer",fontSize:12,fontWeight:600}}>🖨 {ar?"طباعة":"Print"}</button>
              </div>
            </div>

            {/* Table */}
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:560}}>
                <thead>
                  <tr style={{background:"#fafafa"}}>
                    {isEditing && <th style={{padding:"9px 10px",width:36,textAlign:"center",color:"#888",fontWeight:600}}>☑</th>}
                    <th style={{padding:"9px 12px",color:"#888",fontWeight:600,textAlign:"start"}}>#</th>
                    <th style={{padding:"9px 12px",color:"#888",fontWeight:600,textAlign:"start"}}>{ar?"المريض":"Patient"}</th>
                    <th style={{padding:"9px 12px",color:"#888",fontWeight:600,textAlign:"start"}}>{ar?"الفحص":"Test"}</th>
                    <th style={{padding:"9px 12px",color:"#888",fontWeight:600,textAlign:"start"}}>{ar?"التاريخ":"Date"}</th>
                    {isAdmin && <th style={{padding:"9px 12px",color:"#888",fontWeight:600,textAlign:"end"}}>{ar?"السعر":"Price"}</th>}
                    <th style={{padding:"9px 12px",color:"#888",fontWeight:600,textAlign:"center"}}>{ar?"الدفع":"Payment"}</th>
                  </tr>
                </thead>
                <tbody>
                  {displayItems.map((s,i)=>{
                    const excluded = isEditing && !s._include;
                    return (
                      <tr key={s.id} style={{borderTop:"1px solid #f0f0f0",opacity:excluded?0.3:1,background:i%2===0?"#fff":"#fafafa",transition:"opacity .2s"}}>

                          <td style={{padding:"9px 10px",textAlign:"center"}}>
                            <button onClick={()=>toggleItem(s.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${s._include?"#6366f1":"#d1d5db"}`,background:s._include?"#6366f1":"#fff",cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,padding:0}}>

                            </button>
                          </td>
                        )}
                        <td style={{padding:"9px 12px",color:"#aaa",fontSize:12}}>{i+1}</td>
                        <td style={{padding:"9px 12px"}}>
                          <div style={{fontWeight:600,color:"#000",fontSize:13}}>{s.patientName}</div>
                          <div style={{fontSize:10,color:"#aaa",fontFamily:"monospace"}}>{s.sampleCode}</div>
                        </td>
                        <td style={{padding:"9px 12px",color:"#555",fontSize:12,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.testType}</td>
                        <td style={{padding:"9px 12px",color:"#888",fontSize:12}}>{s.collectDate||s.sentDate||"—"}</td>
                        {isAdmin && (
                          <td style={{padding:"9px 12px",textAlign:"end"}}>
                            {isEditing ? (
                              <input type="number" value={s.salePrice||""} onChange={e=>updateField(s.id,"salePrice",e.target.value)}
                                style={{width:88,background:"#fff",border:"1px solid #ebebeb",borderRadius:6,padding:"4px 8px",fontSize:12,textAlign:"end",color:"#000"}}/>
                            ) : <span style={{fontWeight:600,color:"#6366f1"}}>{fmt(s.salePrice)} EGP</span>}
                          </td>
                        )}
                        <td style={{padding:"9px 12px",textAlign:"center"}}>
                          {isEditing ? (
                            <CustomSelect
                          value={s.paymentStatus||"unpaid"}
                          onChange={v=>updateField(s.id,"paymentStatus",v)}
                          options={Object.entries(t.payStatus).map(([k,v2])=>({value:k,label:v2}))}
                          style={{minWidth:120,fontSize:11}}
                        />
                          ) : <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"2px 8px",fontSize:11,border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.07),0 0 0 1px rgba(0,0,0,0.04)",fontWeight:600}}>{t.payStatus[s.paymentStatus]}</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{background:"#f5f5f7",borderTop:"2px solid #bfdbfe"}}>
                    {isEditing && <td/>}
                    <td colSpan={3} style={{padding:"10px 12px",fontWeight:700,color:"#000",fontSize:13}}>
                      {ar?"الإجمالي":"Total"} ({activeItems.length} {ar?"عينة":"items"})
                    </td>
                    <td/>
                    {isAdmin && <td style={{padding:"10px 12px",textAlign:"end",fontWeight:700,color:"#6366f1",fontSize:15}}>{fmt(revenue)} EGP</td>}
                    <td style={{padding:"10px 12px",textAlign:"center"}}>
                      <span style={{color:"#10b981",fontWeight:700,fontSize:12}}>{fmt(paid)} ✓</span>
                      {remaining>0 && <span style={{color:"#ef4444",fontWeight:700,fontSize:12,marginInlineStart:8}}>{fmt(remaining)} ↓</span>}
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        );
      })}
    </div>
  );
}


// ─── SettingsPage ─────────────────────────────────────────────────────────────
function SettingsPage({ t, currentUser, setCurrentUser, isAdmin, onLogout }) {
  const mob = useIsMobile();
  const ar = t.dir === "rtl";
  const [users, setUsers] = useState(loadUsers());

  const [supaStatus, setSupaStatus] = React.useState("checking");

  // Load users from Supabase on mount + test connection
  useEffect(() => {
    const test = async () => {
      try {
        const users = await loadFromCloud("users");
        if (Array.isArray(users) && users.length > 0) {
          setUsers(users);
          try { localStorage.setItem("harmony_users", JSON.stringify(users)); } catch {}
          setSupaStatus("connected");
        } else if (users === null) {
          setSupaStatus("error: cannot reach Supabase");
        } else {
          setSupaStatus("empty");
        }
      } catch(e) {
        setSupaStatus("error: " + e.message);
      }
    };
    test();
  }, []);
  const [editingUser, setEditingUser] = useState(null);
  const [form, setForm] = useState({ username:"", oldPassword:"", newPassword:"", confirmPassword:"" });
  const [msg, setMsg] = useState({ text:"", type:"" });
  const [showPasses, setShowPasses] = useState({});
  const [emailSection, setEmailSection] = useState(false);
  const [emailForm, setEmailForm] = useState(() => {
    try { return JSON.parse(localStorage.getItem("harmony_email_settings")||"{}"); } catch { return {}; }
  });
  useEffect(()=>{
    loadFromCloud("email_settings").then(v=>{ if(v&&typeof v==="object") setEmailForm(v); });
  },[]);
  const [emailMsg, setEmailMsg] = useState({text:"",type:""});

  const saveEmail = () => {
    saveToCloud("email_settings", emailForm);
    setEmailMsg({text: ar?"✓ تم حفظ إعدادات البريد الإلكتروني":"✓ Email settings saved", type:"success"});
    setTimeout(()=>setEmailMsg({text:"",type:""}), 3000);
  };

  const showMsg = (text, type="success") => {
    setMsg({text, type});
    setTimeout(()=>setMsg({text:"",type:""}), 3000);
  };

  const openEdit = (u) => {
    setEditingUser(u.username);
    setForm({ username: u.username, oldPassword:"", newPassword:"", confirmPassword:"" });
    setMsg({text:"",type:""});
  };

  const handleSave = () => {
    const u = users.find(x => x.username === editingUser);
    if (!u) return;

    // Validate old password (only if not admin editing other user)
    const isEditingSelf = currentUser.username === editingUser;
    if (isEditingSelf && form.oldPassword !== u.password) {
      showMsg(ar?"كلمة المرور الحالية غير صحيحة":"Current password is incorrect", "error"); return;
    }

    // Validate new username uniqueness
    const newUsername = form.username.trim();
    if (!newUsername) { showMsg(ar?"اسم المستخدم مطلوب":"Username is required","error"); return; }
    if (newUsername !== editingUser && users.find(x=>x.username===newUsername)) {
      showMsg(ar?"اسم المستخدم موجود بالفعل":"Username already exists","error"); return;
    }

    // Validate new password
    const newPass = form.newPassword;
    if (newPass && newPass.length < 6) {
      showMsg(ar?"كلمة المرور يجب أن تكون 6 أحرف على الأقل":"Password must be at least 6 characters","error"); return;
    }
    if (newPass && newPass !== form.confirmPassword) {
      showMsg(ar?"كلمة المرور الجديدة غير متطابقة":"New passwords don't match","error"); return;
    }

    const updated = users.map(x => x.username===editingUser ? {
      ...x,
      username: newUsername,
      password: newPass || x.password,
    } : x);

    USERS = updated;
    setUsers(updated);
    // Save to Supabase and update status
    saveUsers(updated).then(()=>{
      setSupaStatus("connected");
    }).catch(()=>{
      setSupaStatus("save failed");
    });

    // Update currentUser session if editing self
    if (isEditingSelf) {
      const updatedUser = updated.find(x=>x.username===newUsername);
      setCurrentUser(updatedUser);
      try { sessionStorage.setItem("harmony_user", JSON.stringify(updatedUser)); } catch {}
    }

    setEditingUser(null);
    showMsg(ar?"✓ تم الحفظ بنجاح":"✓ Saved successfully");
  };

  const toggleShow = (field) => setShowPasses(p=>({...p,[field]:!p[field]}));

  const handleDelete = async (username) => {
    if (username === currentUser.username) {
      showMsg(ar?"لا يمكنك حذف حسابك الحالي":"Cannot delete your own account", "error"); return;
    }
    if (!window.confirm(ar?`هل أنت متأكد من حذف المستخدم "${username}"؟`:`Delete user "${username}"?`)) return;
    const updated = users.filter(u => u.username !== username);
    USERS = updated;
    await saveUsers(updated);
    setUsers(updated);
    showMsg(ar?"✓ تم حذف المستخدم":"✓ User deleted");
  };
  const eyeIcon = (show) => (
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {show
        ? <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></>
        : <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>
      }
    </svg>
  );

  return (
    <div style={{maxWidth:680,margin:"0 auto"}}>

      {/* ── Page title ── */}
      <div style={{marginBottom:28}}>
        <h2 style={{color:"#111",fontSize:mob?19:22,fontWeight:700,margin:0,letterSpacing:"-0.5px"}}>
          {ar?"الإعدادات":"Settings"}
        </h2>
        <p style={{color:"#aaa",fontSize:13,margin:"4px 0 0"}}>{ar?"إدارة المستخدمين وبيانات الحساب":"Manage users and account credentials"}</p>
      </div>

      {/* Supabase status - admin only */}
      {isAdmin && (
        <div style={{marginBottom:20,padding:"10px 14px",background:"#fafafa",border:"1px solid #ebebeb",borderRadius:8,fontSize:12,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:supaStatus==="connected"?"#22c55e":supaStatus==="empty"?"#f59e0b":supaStatus==="checking"?"#d1d5db":"#ef4444"}}/>
          <span style={{color:"#555"}}>
            Supabase: {supaStatus==="connected"?(ar?"متصل ✓":"Connected ✓"):supaStatus==="empty"?(ar?"متصل — لا يوجد بيانات محفوظة بعد":"Connected — no users saved yet"):supaStatus==="checking"?(ar?"جاري الفحص...":"Checking..."):supaStatus}
          </span>
          <button onClick={async()=>{
            const ok = await saveUsers(users);
            setSupaStatus("connected");
            showMsg(ar?"✓ تم حفظ المستخدمين في السحابة":"✓ Users saved to cloud");
          }}
            style={{background:"#111",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600,marginInlineStart:"auto"}}>
            {ar?"حفظ في السحابة ☁":"Sync to Cloud ☁"}
          </button>
        </div>
      )}

      {/* Global message */}
      {msg.text && (
        <div style={{display:"flex",alignItems:"center",gap:10,background:msg.type==="error"?"#fff":"#fff",border:`1px solid ${msg.type==="error"?"#ef4444":"#111"}`,borderRadius:10,padding:"12px 16px",marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <span style={{fontSize:16}}>{msg.type==="error"?"✕":"✓"}</span>
          <span style={{color:msg.type==="error"?"#ef4444":"#111",fontWeight:600,fontSize:13}}>{msg.text}</span>
        </div>
      )}

      {/* ── Users Section ── */}
      <div style={{marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.8px"}}>{ar?"المستخدمون":"USERS"}</div>
        </div>
        <div style={{fontSize:12,color:"#aaa"}}>{isAdmin?users.length:1} {ar?"حسابات":"accounts"}</div>
      </div>

      <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        {(isAdmin ? users : users.filter(u=>u.username===currentUser.username)).map((u,idx) => {
          const isEditing = editingUser === u.username;
          const isSelf = currentUser.username === u.username;
          const canEdit = isAdmin || isSelf;

          return (
            <div key={u.username} style={{borderBottom:idx<users.length-1?"1px solid #f5f5f5":"none"}}>
              {/* User row */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",gap:12}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  {/* Avatar */}
                  <div style={{width:42,height:42,borderRadius:"50%",background:"#111",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                  </div>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontWeight:700,color:"#111",fontSize:14}}>{u.username}</span>
                      {isSelf && <span style={{background:"#111",color:"#fff",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:600,letterSpacing:"0.3px"}}>{ar?"أنت":"YOU"}</span>}
                      <span style={{background:"#f5f5f7",color:"#888",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:500,letterSpacing:"0.2px",border:"1px solid #ebebeb"}}>
                        {u.role==="admin"?(ar?"مدير":"ADMIN"):(ar?"مستخدم":"USER")}
                      </span>
                    </div>
                    <div style={{fontSize:12,color:"#aaa",marginTop:2}}>{u.username}@involvout</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  {canEdit && (
                    <button onClick={()=>isEditing?setEditingUser(null):openEdit(u)}
                      style={{background:isEditing?"#f5f5f7":"#fff",color:"#111",border:"1px solid #e5e5e5",borderRadius:8,padding:"7px 16px",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 1px 2px rgba(0,0,0,0.05)",transition:"all .15s"}}>
                      {isEditing?(ar?"إغلاق":"Close"):(ar?"الأمان":"Security")}
                    </button>
                  )}
                  {isAdmin && !isSelf && (
                    <>
                      <button onClick={async()=>{
                        const updated = users.map(x=>x.username===u.username?{...x,role:x.role==="admin"?"user":"admin"}:x);
                        USERS=updated; setUsers(updated); await saveUsers(updated);
                        showMsg(ar?`✓ تم تغيير صلاحية ${u.username}`:`✓ ${u.username} role updated`);
                      }}
                        style={{background:u.role==="admin"?"#f5f5f7":"#fff",color:"#111",border:"1px solid #e5e5e5",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all .15s"}}
                        title={u.role==="admin"?(ar?"تحويل إلى user":"Make User"):(ar?"تحويل إلى admin":"Make Admin")}>
                        {u.role==="admin"?"👑":"👤"}
                      </button>
                      <button onClick={()=>handleDelete(u.username)}
                        style={{background:"#fff",color:"#ef4444",border:"1px solid #fca5a5",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all .15s"}}
                        onMouseEnter={e=>{e.currentTarget.style.background="#fff8f8";}}
                        onMouseLeave={e=>{e.currentTarget.style.background="#fff";}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                        </svg>
                      </button>
                    </>
                  )}
                </div>
              </div>

              {/* Edit form */}
              {isEditing && (
                <div style={{borderTop:"1px solid #f5f5f5",background:"#fafafa"}}>
                  <div style={{padding:"20px 20px 0"}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:16}}>{ar?"تغيير بيانات الحساب":"ACCOUNT CREDENTIALS"}</div>
                    <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:"0 16px"}}>

                      <div style={{gridColumn:"1/-1",marginBottom:16}}>
                        <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6,letterSpacing:"0.1px"}}>{ar?"اسم المستخدم":"Username"}</label>
                        <input value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} style={inp()}/>
                      </div>

                      {isSelf && (
                        <div style={{gridColumn:"1/-1",marginBottom:16}}>
                          <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>{ar?"كلمة المرور الحالية":"Current Password"}</label>
                          <div style={{position:"relative"}}>
                            <input type={showPasses.old?"text":"password"} value={form.oldPassword} onChange={e=>setForm(f=>({...f,oldPassword:e.target.value}))} placeholder="••••••••" style={{...inp(),paddingInlineEnd:44}}/>
                            <button onClick={()=>toggleShow("old")} style={{position:"absolute",insetInlineEnd:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#bbb",display:"flex",alignItems:"center",padding:0}}>
                              {eyeIcon(showPasses.old)}
                            </button>
                          </div>
                        </div>
                      )}

                      <div style={{marginBottom:16}}>
                        <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>
                          {ar?"كلمة المرور الجديدة":"New Password"}
                          <span style={{color:"#bbb",fontWeight:400,marginInlineStart:6,fontSize:11}}>{ar?"اختياري":"optional"}</span>
                        </label>
                        <div style={{position:"relative"}}>
                          <input type={showPasses.new?"text":"password"} value={form.newPassword} onChange={e=>setForm(f=>({...f,newPassword:e.target.value}))} placeholder="••••••••" style={{...inp(),paddingInlineEnd:44}}/>
                          <button onClick={()=>toggleShow("new")} style={{position:"absolute",insetInlineEnd:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#bbb",display:"flex",alignItems:"center",padding:0}}>
                            {eyeIcon(showPasses.new)}
                          </button>
                        </div>
                      </div>

                      <div style={{marginBottom:16}}>
                        <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:6}}>{ar?"تأكيد كلمة المرور":"Confirm Password"}</label>
                        <div style={{position:"relative"}}>
                          <input type={showPasses.confirm?"text":"password"} value={form.confirmPassword} onChange={e=>setForm(f=>({...f,confirmPassword:e.target.value}))} placeholder="••••••••"
                            style={{...inp(),paddingInlineEnd:44,borderColor:form.newPassword&&form.confirmPassword&&form.newPassword!==form.confirmPassword?"#ef4444":"#e5e5e5"}}/>
                          <button onClick={()=>toggleShow("confirm")} style={{position:"absolute",insetInlineEnd:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#bbb",display:"flex",alignItems:"center",padding:0}}>
                            {eyeIcon(showPasses.confirm)}
                          </button>
                        </div>
                        {form.newPassword&&form.confirmPassword&&form.newPassword!==form.confirmPassword&&(
                          <div style={{fontSize:11,color:"#ef4444",marginTop:4,display:"flex",alignItems:"center",gap:4}}>
                            <span>✕</span> {ar?"كلمتا المرور غير متطابقتين":"Passwords don't match"}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",gap:10,padding:"14px 20px",borderTop:"1px solid #f0f0f0"}}>
                    <button onClick={()=>setEditingUser(null)} style={{background:"transparent",color:"#888",border:"1px solid #e5e5e5",borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13}}>
                      {ar?"إلغاء":"Cancel"}
                    </button>
                    <button onClick={handleSave} style={{background:"#111",color:"#fff",border:"none",borderRadius:8,padding:"9px 22px",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 2px 6px rgba(0,0,0,0.15)"}}>
                      {ar?"حفظ التغييرات":"Save Changes"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Note */}
      <div style={{marginTop:12,fontSize:12,color:"#bbb",paddingInlineStart:4}}>
        {ar?"المستخدم العادي يستطيع تعديل بياناته فقط. المدير يستطيع تعديل جميع المستخدمين.":"Regular users can only edit their own credentials. Admins can edit all users."}
      </div>

      {/* ── Logout ── */}
      <div style={{marginTop:32}}>
        <div style={{fontSize:11,fontWeight:600,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12}}>{ar?"الحساب":"ACCOUNT"}</div>
        <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:"#f5f5f7",border:"1px solid #e5e5e5",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <div>
                <div style={{fontWeight:600,color:"#111",fontSize:14}}>{currentUser?.username}</div>
                <div style={{fontSize:12,color:"#aaa",marginTop:1}}>{currentUser?.role==="admin"?(ar?"مدير النظام":"System Admin"):(ar?"مستخدم":"User")}</div>

              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              {ar?"تسجيل الخروج":"Sign Out"}
            </button>
          </div>
        </div>
      </div>

      {/* ── Email Settings ── */}
      <div style={{marginTop:20,background:"#fff",border:"1px solid #ebebeb",borderRadius:12,overflow:"hidden"}}>
        <div onClick={()=>setEmailSection(e=>!e)}

          <span>📧 {ar?"إعدادات البريد الإلكتروني":"Email Settings"}</span>
          <span style={{color:"#aaa",fontSize:14}}>{emailSection?"▲":"▼"}</span>
        </div>

        {emailSection && (
          <div style={{padding:"18px"}}>
            {emailMsg.text && (
              <div style={{background:"#fff",border:`1px solid ${emailMsg.type==="error"?"#ef4444":"#111"}`,borderRadius:10,padding:"10px 14px",marginBottom:14,color:emailMsg.type==="error"?"#ef4444":"#111",fontWeight:600,fontSize:13}}>
                {emailMsg.text}
              </div>
            )}

            <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:"0 16px"}}>

              {/* Sender name */}
              <div style={{marginBottom:14,gridColumn:"1/-1"}}>
                <label style={{display:"block",fontSize:13,fontWeight:600,color:"#555",marginBottom:5}}>
                  {ar?"اسم المرسل":"Sender Name"}
                </label>
                <input value={emailForm.senderName||""} onChange={e=>setEmailForm(f=>({...f,senderName:e.target.value}))}
                  placeholder="Involve Out Lab System"
                  style={inp()}/>
              </div>

              {/* Email address */}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:13,fontWeight:600,color:"#555",marginBottom:5}}>
                  {ar?"البريد الإلكتروني":"Email Address"}
                </label>
                <input type="email" value={emailForm.email||""} onChange={e=>setEmailForm(f=>({...f,email:e.target.value}))}
                  placeholder="lab@involvout.com"
                  style={inp()}/>

// ─── Load extra tests from Supabase ──────────────────────────────────────────
const loadExtraTests = async () => {
  try {
    // Try chunked keys (extra_tests_0, extra_tests_1, ...)
    let all = [];
    for (let i = 0; i < 25; i++) {
      try {
        const r = await fetch(`${SUPA_URL}/rest/v1/app_settings?key=eq.extra_tests_${i}&select=value`, { headers: SUPA_HEADERS });
        if (!r.ok) break;
        const data = await r.json();
        if (!data || !data.length) break;
        let v = data[0].value;
        // Double parse if needed
        if (typeof v === "string") { try { v = JSON.parse(v); } catch { break; } }
        if (typeof v === "string") { try { v = JSON.parse(v); } catch { break; } }
        if (!Array.isArray(v) || v.length === 0) break;
        all = all.concat(v);
      } catch { break; }
    }
    if (all.length > 0) return all;
    // Fallback: try single key
    const r2 = await fetch(`${SUPA_URL}/rest/v1/app_settings?key=eq.extra_tests&select=value`, { headers: SUPA_HEADERS });
    if (r2.ok) {
      const d2 = await r2.json();
      if (d2 && d2.length) {
        let v2 = d2[0].value;
        if (typeof v2 === "string") { try { v2 = JSON.parse(v2); } catch {} }
        if (typeof v2 === "string") { try { v2 = JSON.parse(v2); } catch {} }
        if (Array.isArray(v2) && v2.length > 0) return v2;
      }
    }
    return [];
  } catch { return []; }
};

          )}

            const dispPrice = displayCurrency==="original" ? effPrice : convertPrice(effPrice, test.currency);
            const dispCurrency = displayCurrency==="original" ? (test.currency||"USD") : displayCurrency;

                    <div style={{fontSize:11,color:"#888",marginTop:3}}>{test.lab}</div>

                  <div style={{textAlign:"end",flexShrink:0}}>
                    {editingPrice===test.name ? (

                        <input type="number" value={editVal} onChange={e=>setEditVal(e.target.value)}
                          autoFocus onKeyDown={e=>{if(e.key==="Enter")savePriceOverride(test.name,editVal);if(e.key==="Escape")setEditingPrice(null);}}

                    ) : (
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:700,color:priceOverrides[test.name]!==undefined?"#6366f1":"#111",fontSize:14}}>

                        <span style={{fontSize:11,color:"#aaa"}}>{dispCurrency}</span>
                        {isAdmin && <button onClick={()=>{setEditingPrice(test.name);setEditVal(String(effPrice));}}

                    )}

                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:"1px solid #f5f5f5"}}>
                  <span style={{fontSize:11,color:"#888"}}>TAT: <strong style={{color:"#555"}}>{test.tat||"—"}</strong></span>
                  {test._custom && isAdmin && (
                    <button onClick={()=>delCustom(test._id)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,padding:0}}>✕ {ar?"حذف":"Remove"}</button>
                  )}
                  {priceOverrides[test.name]!==undefined && (
                    <button onClick={()=>resetPrice(test.name)} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:11,padding:0}}>↺ {ar?"إعادة":"Reset"}</button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        // Desktop: table layout
        <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#fafafa",borderBottom:"1.5px solid #e5e5e5"}}>

              <th style={{padding:"11px 16px",color:"#888",fontWeight:600,textAlign:"start",fontSize:11,textTransform:"uppercase",letterSpacing:"0.5px"}}>{ar?"المعمل":"Lab"}</th>
              <th style={{padding:"11px 16px",color:"#888",fontWeight:600,textAlign:"end",fontSize:11,textTransform:"uppercase",letterSpacing:"0.5px"}}>{ar?"السعر":"Price"}</th>
              <th style={{padding:"11px 16px",color:"#888",fontWeight:600,textAlign:"start",fontSize:11,textTransform:"uppercase",letterSpacing:"0.5px"}}>{ar?"العملة":"Currency"}</th>
              <th style={{padding:"11px 16px",color:"#888",fontWeight:600,textAlign:"start",fontSize:11,textTransform:"uppercase",letterSpacing:"0.5px"}}>TAT</th>
              {isAdmin && <th style={{padding:"11px 16px",width:40}}></th>}
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={7} style={{padding:32,textAlign:"center",color:"#aaa",fontSize:13}}>{ar?"لا توجد نتائج":"No results found"}</td></tr>
            )}
            {filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE).map((test, i) => (
              <tr key={i} style={{borderTop:"1px solid #f5f5f5",background:i%2===0?"#fff":"#fafafa"}}>
                <td style={{padding:"10px 16px",color:"#aaa",fontSize:12}}>{i+1}</td>
                <td style={{padding:"10px 16px"}}>
                  <div style={{fontWeight:500,color:"#111"}}>{test.name}</div>
                  {test._custom && (
                    <span style={{fontSize:10,color:"#888",background:"#f5f5f7",border:"1px solid #e5e5e5",borderRadius:4,padding:"1px 6px",marginTop:2,display:"inline-block"}}>
                      {ar?"مضاف":"Custom"}
                    </span>
                  )}
                </td>
                <td style={{padding:"10px 16px",color:"#555",fontSize:12}}>{test.lab || "—"}</td>
                <td style={{padding:"10px 16px",textAlign:"end"}}>
                  {editingPrice === test.name ? (
                    <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
                      <input type="number" value={editVal} onChange={e=>setEditVal(e.target.value)}
                        autoFocus
                        onKeyDown={e=>{if(e.key==="Enter")savePriceOverride(test.name,editVal);if(e.key==="Escape")setEditingPrice(null);}}
                        style={{width:90,background:"#fafafa",border:"1.5px solid #111",borderRadius:6,padding:"4px 8px",fontSize:13,textAlign:"end",color:"#111"}}/>
                      <button onClick={()=>savePriceOverride(test.name,editVal)}
                        style={{background:"#111",color:"#fff",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:12}}>✓</button>
                      <button onClick={()=>setEditingPrice(null)}
                        style={{background:"#fafafa",color:"#888",border:"1px solid #e5e5e5",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:12}}>✕</button>
                    </div>
                  ) : (
                    <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
                      <span style={{fontWeight:600,color:priceOverrides[test.name]!==undefined?"#6366f1":"#111"}}>
                        {(() => {
                          const p = getPrice(test);
                          if (!p && p !== 0) return "—";
                          if (displayCurrency === "original") return fmtN(p);
                          const converted = convertPrice(p, test.currency);
                          return converted ? fmtN(Math.round(converted*100)/100) : fmtN(p);
                        })()}
                      </span>
                      {isAdmin && (
                        <button onClick={()=>{setEditingPrice(test.name);setEditVal(String(getPrice(test)));}}
                          style={{background:"#f5f5f7",border:"1px solid #e5e5e5",cursor:"pointer",color:"#555",fontSize:11,padding:"2px 8px",borderRadius:5}}>
                          ✏</button>
                      )}
                      {isAdmin && priceOverrides[test.name]!==undefined && (
                        <button onClick={()=>resetPrice(test.name)}
                          title="Reset to original"
                          style={{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:11,padding:"2px 4px"}}>↺</button>
                      )}
                    </div>
                  )}
                </td>
                <td style={{padding:"10px 16px",fontSize:12,color:"#888"}}>
                  {displayCurrency === "original" ? (test.currency || "USD") : displayCurrency}
                </td>
                <td style={{padding:"10px 16px",color:"#555",fontSize:12}}>{test.tat || "—"}</td>
                {isAdmin && (
                  <td style={{padding:"10px 12px",textAlign:"center"}}>
                    {test._custom && (
                      <button onClick={() => delCustom(test._id)}
                        style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>✕</button>
                    )}
                  </td>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      )}

      {/* Pagination */}
      {filtered.length > PAGE_SIZE && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:16,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:12,color:"#aaa"}}>
            {ar?"صفحة":"Page"} {page} / {Math.ceil(filtered.length/PAGE_SIZE)} ({(page-1)*PAGE_SIZE+1}-{Math.min(page*PAGE_SIZE,filtered.length)} {ar?"من":"of"} {filtered.length})
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setPage(1)} disabled={page===1}
              style={{background:"#fafafa",border:"1px solid #e5e5e5",color:page===1?"#ccc":"#555",borderRadius:6,padding:"5px 10px",cursor:page===1?"default":"pointer",fontSize:12}}>&lt;&lt;</button>
            <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
              style={{background:"#fafafa",border:"1px solid #e5e5e5",color:page===1?"#ccc":"#555",borderRadius:6,padding:"5px 12px",cursor:page===1?"default":"pointer",fontSize:12}}>&lt;</button>
            {Array.from({length:Math.min(5,Math.ceil(filtered.length/PAGE_SIZE))},(_,i)=>{
              const total=Math.ceil(filtered.length/PAGE_SIZE);
              let p;
              if(total<=5) p=i+1;
              else if(page<=3) p=i+1;
              else if(page>=total-2) p=total-4+i;
              else p=page-2+i;
              return (
                <button key={p} onClick={()=>setPage(p)}
                  style={{background:page===p?"#111":"#fafafa",color:page===p?"#fff":"#555",border:`1px solid ${page===p?"#111":"#e5e5e5"}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,minWidth:32}}>
                  {p}
                </button>
              );
            })}
            <button onClick={()=>setPage(p=>Math.min(Math.ceil(filtered.length/PAGE_SIZE),p+1))} disabled={page===Math.ceil(filtered.length/PAGE_SIZE)}
              style={{background:"#fafafa",border:"1px solid #e5e5e5",color:page===Math.ceil(filtered.length/PAGE_SIZE)?"#ccc":"#555",borderRadius:6,padding:"5px 12px",cursor:page===Math.ceil(filtered.length/PAGE_SIZE)?"default":"pointer",fontSize:12}}>&gt;</button>
            <button onClick={()=>setPage(Math.ceil(filtered.length/PAGE_SIZE))} disabled={page===Math.ceil(filtered.length/PAGE_SIZE)}
              style={{background:"#fafafa",border:"1px solid #e5e5e5",color:page===Math.ceil(filtered.length/PAGE_SIZE)?"#ccc":"#555",borderRadius:6,padding:"5px 10px",cursor:page===Math.ceil(filtered.length/PAGE_SIZE)?"default":"pointer",fontSize:12}}>&gt;&gt;</button>
          </div>
        </div>
      )}
    </div>
  );
}


// ─── ClientsBookPage ──────────────────────────────────────────────────────────
function ClientsBookPage({ t, isAdmin }) {
  const mob = useIsMobile();
  const ar = t.dir === "rtl";

  const [clients, setClients] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("harmony_clients_book") || "[]"); } catch { return []; }
  });
  const [search, setSearch] = React.useState("");
  const [page, setPage] = React.useState(1);
  const PAGE_SIZE = 50;
  const [showForm, setShowForm] = React.useState(false);
  const [editing, setEditing] = React.useState(null);
  const [form, setForm] = React.useState({ name:"", email:"", phone:"", phone2:"", address:"", notes:"" });
  const [saved, setSaved] = React.useState(false);

  React.useEffect(() => {
    loadFromCloud("clients_book").then(v => { if(Array.isArray(v) && v.length > 0) setClients(v); });
  }, []);

  const saveClients = (updated) => {
    setClients(updated);
    try { localStorage.setItem("harmony_clients_book", JSON.stringify(updated)); } catch {}
    saveToCloud("clients_book", updated);
  };

  const openAdd = () => {
    setEditing(null);
    setForm({ name:"", email:"", phone:"", phone2:"", address:"", notes:"" });
    setShowForm(true);
  };

  const openEdit = (c) => {
    setEditing(c.id);
    setForm({ name:c.name||"", email:c.email||"", phone:c.phone||"", phone2:c.phone2||"", address:c.address||"", notes:c.notes||"" });
    setShowForm(true);
  };

  const handleSave = () => {
    if (!form.name.trim()) return;
    let updated;
    if (editing) {
      updated = clients.map(c => c.id===editing ? {...c,...form} : c);
    } else {
      updated = [...clients, {...form, id: Date.now()}];
    }
    saveClients(updated);
    setShowForm(false);
    setEditing(null);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const handleDelete = (id) => {
    if (!window.confirm(ar?"هل تريد حذف هذا العميل؟":"Delete this client?")) return;
    saveClients(clients.filter(c => c.id !== id));
  };

  const filtered = clients.filter(c => {
    const q = search.toLowerCase();
    return !q || c.name?.toLowerCase().includes(q) || c.email?.toLowerCase().includes(q) || c.phone?.includes(q);
  });

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{color:"#111",fontSize:mob?17:21,fontWeight:700,margin:0,letterSpacing:"-0.4px"}}>
            👥 {ar?"دفتر العملاء":"Clients"}
          </h2>
          <p style={{color:"#aaa",fontSize:12,margin:"3px 0 0"}}>{filtered.length} {ar?"عميل":"clients"}</p>
        </div>
        <button onClick={openAdd}
          style={{background:"#111",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}>
          + {ar?"إضافة عميل":"Add Client"}
        </button>
      </div>

      {/* Add/Edit Form */}
      {showForm && (
        <div style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:14,padding:mob?16:24,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:16}}>
            {editing?(ar?"تعديل العميل":"EDIT CLIENT"):(ar?"عميل جديد":"NEW CLIENT")}
          </div>
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:"0 16px"}}>
            <div style={{gridColumn:"1/-1",marginBottom:14}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>{ar?"الاسم *":"Name *"}</label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                placeholder={ar?"اسم العميل أو المستشفى":"Client or hospital name"} style={inp()}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>📧 {ar?"البريد الإلكتروني":"Email"}</label>
              <input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}
                placeholder="example@email.com" style={inp()}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>📱 {ar?"رقم الهاتف":"Phone"}</label>
              <input type="tel" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}
                placeholder="+20 10 xxxx xxxx" style={inp()}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>📱 {ar?"رقم إضافي":"Phone 2"}</label>
              <input type="tel" value={form.phone2} onChange={e=>setForm(f=>({...f,phone2:e.target.value}))}
                placeholder="+20 10 xxxx xxxx" style={inp()}/>

  const handleSubmit = async () => {
    if (!form.username.trim()) { setError(ar?"أدخل اسم المستخدم":"Enter a username"); return; }
    if (form.password.length < 6) { setError(ar?"كلمة المرور 6 أحرف على الأقل":"Password must be at least 6 characters"); return; }
    if (form.password !== form.confirm) { setError(ar?"كلمتا المرور غير متطابقتين":"Passwords don't match"); return; }
    setLoading(true); setError("");
    // Check if username exists
    const existing = loadUsers();
    if (existing.find(u => u.username === form.username.trim())) {
      setError(ar?"اسم المستخدم موجود بالفعل":"Username already taken");
      setLoading(false); return;
    }
    // Create new user with role "user"
    const newUser = { username: form.username.trim(), password: form.password, role: "user" };
    const updated = [...existing, newUser];
    USERS = updated;
    await saveUsers(updated);
    setLoading(false);
    onSignUp(newUser);

// ─── APP ──────────────────────────────────────────────────────────────────────
export default function App() {
  const mob = useIsMobile();
  const [lang, setLangState] = useState(() => {
    try { return localStorage.getItem("harmony_lang") || "ar"; } catch { return "ar"; }
  });
  const setLang = (fn) => { const next = typeof fn==="function"?fn(lang):fn; try{localStorage.setItem("harmony_lang",next);}catch{} setLangState(next); };
  const t = T[lang];
  const [tab, setTabState] = useState("dashboard");
  const setTab = (v) => { setTabState(v); };
  const [samples, setSamplesState] = useState(() => {
    try {
      const saved = localStorage.getItem("harmony_samples");
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | ok | error

  // Wrap setSamples to also sync to Supabase
  const setSamples = React.useCallback((updater) => {
    setSamplesState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      return next;
    });
  }, []);
  const [editTarget, setEditTarget] = useState(null);
  const [showAlert, setShowAlert] = useState(true);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [sidebarExpanded, setSidebarExpanded] = useState(false);
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem("harmony_user") || "null"); } catch { return null; }
  });
  const isAdmin = currentUser?.role === "admin";

  const handleLogin = (user) => {
    try { sessionStorage.setItem("harmony_user", JSON.stringify(user)); } catch {}
    setCurrentUser(user);
  };
  const handleLogout = () => {
    try { sessionStorage.removeItem("harmony_user"); } catch {}
    setCurrentUser(null);
  };

  const [newOverdue, setNewOverdue] = useState([]);
  const [showToast, setShowToast] = useState(false);

  // Load + sync samples from Supabase
  const loadSamplesFromSupabase = async (silent=false) => {
    try {
      if (!silent) setSyncStatus("syncing");
      const r = await fetch(`${SUPA_URL}/rest/v1/samples?select=id,data&order=created_at.asc`, { headers: SUPA_HEADERS });
      if (!r.ok) { if (!silent) setSyncStatus("ok"); return; }
      const data = await r.json();
      if (!data) { if (!silent) setSyncStatus("ok"); return; }
      // Parse rows - deduplicate by sampleCode
      const seen = new Map();
      data.forEach(row => {
        try {
          const s = {...JSON.parse(row.data || "{}"), id: row.id};
          if (s.patientName) {
            const key = s.sampleCode || s.id;
            if (!seen.has(key)) seen.set(key, s);
          }
        } catch {}
      });
      const parsed = [...seen.values()];
      // Only update state if data changed
      setSamplesState(prev => {
        const prevStr = JSON.stringify(prev.map(s=>s.id).sort());
        const newStr = JSON.stringify(parsed.map(s=>s.id).sort());
        if (prevStr === newStr && prev.length === parsed.length) return prev;
        try { localStorage.setItem("harmony_samples", JSON.stringify(parsed)); } catch {}
        return parsed;
      });
      if (!silent) setSyncStatus("ok");
    } catch { if (!silent) setSyncStatus("ok"); }
  };

  useEffect(() => {
    loadSamplesFromSupabase();
    // Poll every 30 seconds for changes from other devices
    const interval = setInterval(() => loadSamplesFromSupabase(true), 30000);
    return () => clearInterval(interval);
  }, []);

  // Track previous sample IDs to detect deletions
  // Save samples to localStorage as backup only
  useEffect(() => {
    try {
      const toSave = samples.map(s => ({...s, resultPdf: s.resultPdf && s.resultPdf.length > 500000 ? "__PDF_TOO_LARGE__" : s.resultPdf}));
      localStorage.setItem("harmony_samples", JSON.stringify(toSave));
    } catch {}
  }, [samples]);

  // Auto-check TAT every 60 seconds + on mount
  useEffect(() => {
    const checkTAT = () => {
      setSamples(prev => {
        const flagged = [];
        const updated = prev.map(s => {
          // Only auto-flag sent/abroad that exceeded their specific TAT
          if (["sent","abroad"].includes(s.status) && isOverdue(s)) {
            flagged.push(s);
            return {...s, status:"overdue"};
          }
          return s;
        });
        if (flagged.length > 0) {
          setNewOverdue(flagged);
          setShowToast(true);
          setTimeout(() => setShowToast(false), 6000);
        }
        return updated;
      });
    };
    checkTAT();
    const interval = setInterval(checkTAT, 60000);
    return () => clearInterval(interval);
  }, []);

  const overdue = samples.filter(s => s.status==="overdue" || (["sent","abroad"].includes(s.status) && isOverdue(s)));
  const totalRevenue = samples.reduce((a,s)=>a+Number(s.salePrice||0),0);

  const stats = [
    {l:t.dash.total, v:samples.length, c:"#6366f1"},
    {l:t.dash.pending, v:samples.filter(s=>s.status==="received").length, c:"#3b82f6"},
    {l:t.dash.abroad, v:samples.filter(s=>["sent","abroad"].includes(s.status)).length, c:"#f59e0b"},
    {l:t.dash.overdue, v:overdue.length, c:"#ef4444"},
    {l:t.dash.done, v:samples.filter(s=>s.status==="done").length, c:"#10b981"},
    {l:t.dash.revenue, v:fmt(totalRevenue)+" EGP", c:"#8b5cf6"},
  ];

  const saveToSupabase = async (data) => {
    const cleanData = {...data, resultPdf: data.resultPdf && data.resultPdf.length > 500000 ? null : data.resultPdf};
    const row = [{ id: data.id, data: JSON.stringify(cleanData) }];
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        const r = await fetch(`${SUPA_URL}/rest/v1/samples`, {
          method: "POST",
          headers: { ...SUPA_HEADERS, "Prefer": "resolution=merge-duplicates,return=minimal" },
          body: JSON.stringify(row)
        });

        const err = await r.text();
        console.error("Save attempt", attempt+1, "failed:", err);
      } catch(e) { console.error("Save attempt", attempt+1, "error:", e); }

    return false;

      return updated;

              </div>
              <div style={{background:"#fafafa",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden"}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid #f0f0f0",fontWeight:600,color:"#111",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:14}}>
                  <span>🧪 {t.nav.samples}</span>
                  <button onClick={()=>goTab("form")} style={{background:"#111",color:"#fff",border:"none",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontSize:12}}>+ {t.nav.newSample}</button>
                </div>
                {samples.slice(0,5).map((s,i)=>(
                  <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderTop:i>0?"1px solid #0f172a":"none",gap:8}}>
                    <div style={{minWidth:0}}>
                      <div style={{color:"#111",fontWeight:500,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.patientName}</div>
                      <div style={{color:"#111",fontSize:11,fontFamily:"monospace"}}>{s.sampleCode}</div>
                    </div>
                    <span style={{background:"#fff",color:"#111",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600,border:"1px solid #e5e5e5",boxShadow:"0 2px 4px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.04)",flexShrink:0}}>{t.statuses[s.status]}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab==="form" && <SampleForm t={t} samples={samples} editTarget={editTarget} onSave={handleSave} onCancel={()=>{setTab("samples");setEditTarget(null);}} isAdmin={isAdmin}/>}
          {tab==="samples" && <SamplesPage t={t} samples={samples} setSamples={setSamples} onEdit={handleEdit} onDelete={handleDelete} onAddNew={()=>{setEditTarget(null);setTab("form");}} lang={lang} isAdmin={isAdmin}/>}
          {tab==="accounting" && <Accounting t={t} samples={samples} setSamples={setSamples}/>}
          {tab==="clients" && <ClientsPage t={t} samples={samples} isAdmin={isAdmin}/>}
          {tab==="results" && <ResultsPage t={t} samples={samples} setSamples={setSamples}/>}
          {tab==="addtest" && <AddTestPage t={t}/>}
          {tab==="tests" && <TestsPage t={t} isAdmin={isAdmin}/>}
          {tab==="shipments" && <ShipmentsPage t={t} samples={samples} setSamples={setSamples}/>}
          {tab==="settings" && <SettingsPage t={t} currentUser={currentUser} setCurrentUser={setCurrentUser} isAdmin={isAdmin} onLogout={handleLogout}/>}
          {tab==="invoice" && <InvoicePage t={t} samples={samples} setSamples={setSamples} isAdmin={isAdmin}/>}
          {tab==="clientsbook" && <ClientsBookPage t={t} isAdmin={isAdmin}/>}
        </div>
      </div>



    </div>
  );
}

const domNode = document.getElementById('root');
const root = ReactDOM.createRoot(domNode);
root.render(React.createElement(App));
  </script>
</body>
</html>
